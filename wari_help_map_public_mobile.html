    .top{padding:10px 12px 8px;background:linear-gradient(135deg,var(--brand),#991b1b 55%,#ea580c);color:#fff;box-shadow:0 3px 18px rgba(124,29,29,.28);z-index:30}

    .map-wrap{position:relative;min-height:0}.map{height:100%;width:100%;background:#e2e8f0}.locate{position:absolute;right:12px;bottom:12px;z-index:20;border:0;border-radius:999px;background:#fff;color:var(--ink);box-shadow:var(--shadow);padding:12px 14px;font-size:16px;font-weight:900}.status-chip{position:absolute;left:12px;right:80px;bottom:12px;z-index:20;background:rgba(255,255,255,.95);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:9px 10px;font-size:12px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sheet{background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -16px 40px rgba(15,23,42,.16);z-index:40;max-height:50dvh;display:grid;grid-template-rows:auto auto 1fr;transition:max-height .22s ease}.sheet.expanded{max-height:78dvh}.grab{width:46px;height:5px;border-radius:20px;background:#cbd5e1;margin:8px auto 6px}.tools{padding:0 12px 8px}.search{width:100%;height:44px;border:1px solid var(--line);border-radius:15px;padding:0 12px;font-size:16px;font-weight:650;outline:none;background:#f8fafc}.chips{display:flex;gap:8px;overflow-x:auto;padding:9px 0 1px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:900;white-space:nowrap;color:#334155}.chip.active{background:#7c1d1d;color:#fff;border-color:#7c1d1d}.chip.danger.active{background:#dc2626;border-color:#dc2626}.chip.green.active{background:#15803d;border-color:#15803d}.chip.blue.active{background:#2563eb;border-color:#2563eb}.summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 12px 9px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}.summary b{font-size:14px;color:var(--ink)}.list{overflow:auto;padding:10px 12px 18px;background:#f8fafc}.card{position:relative;background:#fff;border:1px solid #e5e7eb;border-left:7px solid #94a3b8;border-radius:20px;padding:13px;box-shadow:0 3px 14px rgba(15,23,42,.07);margin-bottom:10px}.card.ambulance{border-left-color:#dc2626}.card.health{border-left-color:#15803d}.card.halt{border-left-color:#92400e}.card.water{border-left-color:#0284c7}.card-top{display:flex;gap:9px;align-items:flex-start}.ico{flex:0 0 38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#fee2e2;font-size:22px}.card.health .ico{background:#dcfce7}.card.halt .ico{background:#fef3c7}.card.water .ico{background:#e0f2fe}.card-title{margin:0;font-size:15.5px;line-height:1.22;font-weight:950;letter-spacing:-.01em}.dist{margin-left:auto;background:#f1f5f9;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:950;white-space:nowrap;color:#0f172a}.near{background:#dc2626;color:#fff}.meta{margin:8px 0 0;font-size:13px;line-height:1.38;color:#475569}.meta strong{color:#0f172a}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.badge{font-size:11px;font-weight:900;border-radius:999px;padding:4px 7px;background:#f1f5f9;color:#334155}.badge.red{background:#fee2e2;color:#991b1b}.badge.green{background:#dcfce7;color:#166534}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}.actions a,.actions button{border:0;text-decoration:none;border-radius:14px;padding:10px 6px;min-height:42px;font-size:13px;font-weight:950;text-align:center;display:flex;align-items:center;justify-content:center;color:#0f172a;background:#f1f5f9}.actions .call{background:#16a34a;color:#fff}.actions .dir{background:#2563eb;color:#fff}.actions .share{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.empty{padding:22px;text-align:center;color:#64748b}.small-note{font-size:11px;color:#64748b;margin-top:6px}.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:100;align-items:end}.modal.open{display:flex}.modal-card{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:17px 14px 24px;box-shadow:var(--shadow)}.modal h2{margin:0 0 8px;font-size:19px}.field{display:block;width:100%;height:46px;border:1px solid var(--line);border-radius:14px;padding:0 12px;font-size:16px;margin:8px 0;background:#f8fafc}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.leaflet-popup-content{font-family:system-ui,"Noto Sans Devanagari",Arial,sans-serif;font-size:14px;line-height:1.35}.pin{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;color:#fff;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);font-size:16px}.pin.ambulance{background:# <body>
<div class="app">
  <header class="top">
    <div class="top-row">
      <div class="title">
        <h1>वारी सहाय्य नकाशा</h1>
        <p>Find nearest ambulance, doctor, PHC and mukkam support</p>
      </div>
      <div class="pill">PUBLIC</div>
    </div>
  </header>
  <section class="emergency">
    <a class="btn btn-danger" href="tel:108">🚑 Call 108</a>
    <a class="btn btn-green" href="tel:112">🆘 112</a>
    <button class="btn btn-blue" onclick="openRoute()">🗺 Route</button>
  </section>
  <main class="map-wrap">
    <div id="map" class="map"></div>
    <div id="mapStatus" class="status-chip">Tap 📍 to find nearest help</div>
    <button class="locate" onclick="locateMe()">📍 Near me</button>
  </main>
  <section id="sheet" class="sheet">
    <div class="grab" onclick="toggleSheet()"></div>
    <div class="tools">
      <input id="search" class="search" placeholder="Search place, doctor, vehicle… / शोधा" oninput="refresh()" />
      <div class="chips" id="categoryChips">
        <button class="chip active" data-cat="all" onclick="setCat('all')">All</button>
        <button class="chip danger" data-cat="ambulance" onclick="setCat('ambulance')">🚑 Ambulance</button>
        <button class="chip green" data-cat="doctor" onclick="setCat('doctor')">🩺 Doctor/PHC</button>
        <button class="chip green" data-cat="hospital" onclick="setCat('hospital')">🏥 Hospital</button>
        <button class="chip water" data-cat="water" onclick="setCat('water')">💧 Water</button>
        <button class="chip" data-cat="halt" onclick="setCat('halt')">⛺ Mukkam</button>
      </div>
      <div class="chips" id="radiusChips">
        <button class="chip" data-radius="100" onclick="setRadius(100)">100 m</button>
        <button class="chip active" data-radius="500" onclick="setRadius(500)">500 m</button>
        <button class="chip" data-radius="1000" onclick="setRadius(1000)">1 km</button>
        <button class="chip" data-radius="5000" onclick="setRadius(5000)">5 km</button>
        <button class="chip" data-radius="99999999" onclick="setRadius(99999999)">All</button>
      </div>
    </div>
    <div class="summary"><span><b id="resultCount">0</b> support points</span><span id="gpsText">GPS not active</span></div>
    <div id="list" class="list"></div>
  </section>
</div>

<div id="helpModal" class="modal" onclick="closeModal(event)">
  <div class="modal-card">
    <h2>Share location / मदत मागा</h2>
    <div class="small-note">This prepares a WhatsApp/system share message. Choose control room, Dindi head or volunteer group.</div>
    <input id="dindi" class="field" placeholder="Dindi No. / नाव / mobile reference" />
    <select id="issue" class="field">
      <option>Medical emergency / वैद्यकीय मदत</option>
      <option>Ambulance required / रुग्णवाहिका हवी</option>
      <option>Water required / पाणी हवे</option>
      <option>Lost person / व्यक्ती हरवली</option>
      <option>Other help / इतर मदत</option>
    </select>
    <div class="modal-grid">
      <button class="btn btn-white" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" onclick="shareCurrentLocation()">Share</button>
    </div>
  </div>
</div>

let map, userMarker, userLocation = null, markers = [], selectedCat = 'all', selectedRadius = 500, selectedPoint = null;
POINTS.forEach((p,i)=>p._idx=i);
const $ = id => document.getElementById(id);

function iconFor(p){ const t=(p.Type||'').toLowerCase(); if(t.includes('ambulance')) return '🚑'; if(t.includes('hospital')||t.includes('rural')) return '🏥'; if(t.includes('phc')||t.includes('hbt')) return '🩺'; if(t.includes('water')) return '💧'; if(t.includes('halt')||t.includes('mukkam')) return '⛺'; return '📍'; }
function clsFor(p){ const t=(p.Type||'').toLowerCase(); if(t.includes('ambulance')) return 'ambulance'; if(t.includes('hospital')||t.includes('phc')||t.includes('hbt')||t.includes('rural')) return 'health'; if(t.includes('halt')||t.includes('mukkam')) return 'halt'; if(t.includes('water')) return 'water'; return 'other'; }
function haversine(lat1,lon1,lat2,lon2){ const R=6371000, r=x=>x*Math.PI/180; const dLat=r(lat2-lat1), dLon=r(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2; return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
function fmtDist(m){ if(m==null) return '—'; return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(1)+' km'; }
function cleanTel(s){ return (s||'').toString().replace(/[^0-9+]/g,''); }
function openRoute(){ window.open(MASTER_MAP_URL,'_blank'); }
function toggleSheet(){ $('sheet').classList.toggle('expanded'); }
function setCat(cat){ selectedCat = cat; document.querySelectorAll('#categoryChips .chip').forEach(b=>b.classList.toggle('active', b.dataset.cat===cat)); refresh(); }
function setRadius(r){ selectedRadius = r; document.querySelectorAll('#radiusChips .chip').forEach(b=>b.classList.toggle('active', Number(b.dataset.radius)===r)); refresh(); }
function matchesCat(p){ const t=(p.Type||'').toLowerCase(); if(selectedCat==='all') return true; if(selectedCat==='ambulance') return t.includes('ambulance'); if(selectedCat==='doctor') return t.includes('phc') || t.includes('hbt'); if(selectedCat==='hospital') return t.includes('hospital') || t.includes('rural'); if(selectedCat==='water') return t.includes('water'); if(selectedCat==='halt') return t.includes('halt') || t.includes('mukkam'); return true; }
function matchesSearch(p){ const q=$('search').value.trim().toLowerCase(); if(!q) return true; return [p.label,p.Name,p.Type,p.Landmark,p.place,p.vehicle,p.doctor,p.pilot,p.base,p.Description].join(' ').toLowerCase().includes(q); }
function distanceFor(p){ if(!userLocation) return null; return haversine(userLocation[0], userLocation[1], p.Latitude, p.Longitude); }
function directionsUrl(p){ return `https://www.google.com/maps/dir/?api=1&destination=${p.Latitude},${p.Longitude}`; }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function popupHtml(p){ const call=cleanTel(p.call); const meta=[]; if(p.vehicle) meta.push(`<b>Vehicle:</b> ${esc(p.vehicle)}`); if(p.doctor) meta.push(`<b>Doctor/EMSO:</b> ${esc(p.doctor)}`); if(p.base) meta.push(`<b>Base:</b> ${esc(p.base)}`); if(p.place) meta.push(`<b>Place:</b> ${esc(p.place)}`); return `<b>${iconFor(p)} ${esc(p.label)}</b><br>${meta.join('<br>')}<br><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">${call?`<a href="tel:${call}">Call</a>`:''}<a target="_blank" href="${directionsUrl(p)}">Directions</a></div>`; }
function drawMarkers(points){ markers.forEach(m=>map.removeLayer(m)); markers=[]; points.forEach(p=>{ const c=clsFor(p); const m=L.marker([p.Latitude,p.Longitude],{icon:L.divIcon({className:'',html:`<div class="pin ${c}">${iconFor(p)}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map).bindPopup(popupHtml(p)); markers.push(m); }); }
function visiblePoints(){ let pts=POINTS.filter(p=>matchesCat(p)&&matchesSearch(p)).map(p=>({...p, dist:distanceFor(p)})); if(userLocation && selectedRadius < 99999999) pts=pts.filter(p=>p.dist!=null && p.dist<=selectedRadius); if(userLocation) pts.sort((a,b)=>(a.dist??999999999)-(b.dist??999999999)); else pts.sort((a,b)=>(a.Type||'').localeCompare(b.Type||'') || (a.label||'').localeCompare(b.label||'')); return pts; }
function refresh(){ const pts=visiblePoints(); $('resultCount').textContent = pts.length; $('gpsText').textContent = userLocation ? 'Sorted by distance' : 'Tap Near me for distance'; $('mapStatus').textContent = userLocation ? `Showing ${pts.length} nearby point(s)` : 'Tap 📍 Near me to use current location'; drawMarkers(pts.slice(0, 120)); renderList(pts.slice(0, 60)); }
function detailLine(label,value){ return value ? `<div><strong>${esc(label)}</strong> ${esc(value)}</div>` : ''; }
function renderList(pts){ const list=$('list'); if(!pts.length){ list.innerHTML='<div class="empty">No point found for this filter. Try All or increase radius.</div>'; return; } list.innerHTML=pts.map(p=>{ const c=clsFor(p), call=cleanTel(p.call), dist=fmtDist(p.dist), near=p.dist!=null&&p.dist<=100, verify=p.ready==='verify'; return `<article class="card ${c}">
      <div class="card-top"><div class="ico">${iconFor(p)}</div><div style="min-width:0;flex:1"><h3 class="card-title">${esc(p.label)}</h3><div class="badges"><span class="badge ${verify?'red':'green'}">${verify?'Verify before public':'Public ready'}</span>${p['MEMS Type']?`<span class="badge">${esc(p['MEMS Type'])}</span>`:''}${p['Risk zone']?`<span class="badge red">${esc(p['Risk zone'])}</span>`:''}</div></div><div class="dist ${near?'near':''}">${dist}</div></div>
      <div class="meta">${detailLine('Place:',p.place)}${detailLine('Vehicle:',p.vehicle)}${detailLine('Doctor/EMSO:',p.doctor)}${detailLine('Base:',p.base)}${detailLine('Pilot/EA:',p.pilot)}</div>
      <div class="actions">${call?`<a class="call" href="tel:${call}">📞 Call</a>`:`<button disabled>📞 No call</button>`}<a class="dir" target="_blank" href="${directionsUrl(p)}">🧭 Direction</a><button class="share" onclick="openShareByIndex(${p._idx})">📤 Share</button></div>
    </article>`; }).join(''); }
function locateMe(){ if(!navigator.geolocation){ $('mapStatus').textContent='Location not supported on this phone/browser'; return; } $('mapStatus').textContent='Getting GPS location…'; navigator.geolocation.getCurrentPosition(pos=>{ userLocation=[pos.coords.latitude,pos.coords.longitude]; if(userMarker) map.removeLayer(userMarker); userMarker=L.marker(userLocation,{icon:L.divIcon({className:'',html:'<div class="user-pin"></div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map).bindPopup('आपण येथे आहात / You are here').openPopup(); map.setView(userLocation,16); $('mapStatus').textContent=`GPS active. Accuracy about ${Math.round(pos.coords.accuracy)} m`; $('gpsText').textContent=`Accuracy ${Math.round(pos.coords.accuracy)} m`; refresh(); }, err=>{ $('mapStatus').textContent='GPS failed. Allow location permission or use search.'; }, {enableHighAccuracy:true,timeout:15000,maximumAge:20000}); }
function openShareByIndex(idx){ const p=POINTS[idx]; selectedPoint = p ? p.label : null; $('helpModal').classList.add('open'); setTimeout(()=>$('dindi').focus(),100); }
function openShare(label){ selectedPoint = label || null; $('helpModal').classList.add('open'); setTimeout(()=>$('dindi').focus(),100); }
function closeModal(e){ if(!e || e.target.id==='helpModal' || e.target.classList.contains('btn-white')) $('helpModal').classList.remove('open'); }
function shareCurrentLocation(){ const d=$('dindi').value.trim(); const issue=$('issue').value; const loc = userLocation ? `https://www.google.com/maps/search/?api=1&query=${userLocation[0]},${userLocation[1]}` : 'Location not available'; const msg = `Wari Help Request%0A${encodeURIComponent(issue)}%0A${d?encodeURIComponent('Dindi/Name: '+d)+'%0A':''}${selectedPoint?encodeURIComponent('Nearest point: '+selectedPoint)+'%0A':''}${encodeURIComponent('My location: ')}${encodeURIComponent(loc)}`; const text=decodeURIComponent(msg.replaceAll('%0A','\n')); if(navigator.share){ navigator.share({title:'Wari Help Request', text}).catch(()=>{}); } else { window.open('https://wa.me/?text='+msg,'_blank'); } closeModal(); }
function init(){ map=L.map('map',{zoomControl:false}).setView([18.419360226796154,74.02765555],10); L.control.zoom({position:'bottomleft'}).addTo(map); L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map); refresh(); setTimeout(()=>{ if(markers.length){ const group=L.featureGroup(markers); map.fitBounds(group.getBounds().pad(0.12)); } },250); }
document.addEventListener('DOMContentLoaded', init);
</script>
