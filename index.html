<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https:; media-src 'self' https:; frame-src 'self' https://www.youtube.com; connect-src 'self' https:; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>आरोग्य संपन्न वारी</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#f27405" />
  <script>if(/Android|iPhone|iPod|IEMobile|Mobile/i.test(navigator.userAgent)||matchMedia('(max-width:700px)').matches)location.replace('./app.html?v=150');</script>
  <link rel="stylesheet" href="./assets/css/shell.css" />
</head>
<body>
  <iframe class="mobile-frame" src="./app.html?v=150" title="आरोग्य संपन्न वारी" allow="geolocation; clipboard-write; web-share"></iframe>

  <main class="desktop-shell">
    <section class="phone-wrap">
      <iframe id="appFrame" src="./app.html?v=150" title="आरोग्य संपन्न वारी मोबाइल UI" allow="geolocation; clipboard-write; web-share"></iframe>
    </section>
    <section class="map-wrap">
      <div class="desktop-head">
        <h1>आरोग्य संपन्न वारी · मदत नकाशा</h1>
        <p>श्री संत ज्ञानेश्वर महाराज आणि जगद्गुरू श्री संत तुकाराम महाराज पालखी मार्गासाठी आमचे मदत केंद्र.</p>
        <p style="margin:4px 0 0;font-size:13px;font-weight:800;color:#7c2d00">💡 संकल्पना: सार्वजनिक आरोग्य विभाग, महाराष्ट्र शासन</p>
        <div class="desk-actions">
          <button class="desk-btn" onclick="locateBothMaps()">📍 माझ्या जवळ मदत शोधा</button>
          <button class="desk-btn" onclick="showDesktopMap()">🗺 नकाशा दाखवा</button>
          <button class="desk-btn" onclick="showDesktopType('charanseva')">🙏 चरणसेवा</button>
        </div>
      </div>
      <!-- Google My Map is intentionally disabled for now. Kept for later reference: https://www.google.com/maps/d/u/0/embed?mid=1151dFIqz_htDjnDRMRnDqnJQE9JW3VQ -->
      <iframe id="osmFrame" class="map-frame" src="./map.html?v=150" title="आरोग्य संपन्न वारी मदत नकाशा" allow="geolocation; clipboard-write; web-share" loading="lazy"></iframe>
    </section>
  </main>
  <script src="./assets/js/shell.js"></script>
</body>
</html>
