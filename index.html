<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>वारी सहाय्य नकाशा</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body{margin:0;font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;background:#fff7ed;color:#111827}*{box-sizing:border-box}.app{height:100dvh;display:grid;grid-template-rows:auto auto 1fr auto}.top{background:linear-gradient(135deg,#7c1d1d,#ea580c);color:white;padding:12px}.top h1{font-size:20px;margin:0}.top p{font-size:12px;margin:4px 0 0}.quick{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px;background:#fff;padding:10px;box-shadow:0 4px 14px #0001}.btn{border:0;border-radius:14px;padding:11px 8px;font-weight:900;font-size:14px;text-decoration:none;text-align:center;color:#111827;background:#f1f5f9;cursor:pointer}.red{background:#dc2626;color:white}.green{background:#15803d;color:white}.blue{background:#2563eb;color:white}.mapwrap{position:relative;min-height:0}#map{height:100%;min-height:220px}.locate,.backmap{position:absolute;right:12px;z-index:500;background:white;border:0;border-radius:999px;padding:12px 14px;font-weight:900;box-shadow:0 8px 24px #0002;cursor:pointer}.locate{bottom:12px}.backmap{bottom:64px;font-size:13px}.status{position:absolute;left:12px;right:82px;bottom:12px;z-index:500;background:#fffffff2;border-radius:14px;padding:9px;font-size:12px;box-shadow:0 8px 24px #0002;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sheet{background:white;border-radius:22px 22px 0 0;box-shadow:0 -12px 30px #0002;max-height:54dvh;display:grid;grid-template-rows:auto auto 1fr}.grab{width:46px;height:5px;background:#cbd5e1;border-radius:10px;margin:8px auto}.tools{padding:0 12px 8px}.search{width:100%;height:44px;border:1px solid #e2e8f0;border-radius:14px;padding:0 12px;font-size:16px}.chips{display:flex;gap:8px;overflow-x:auto;padding-top:9px}.chip{border:1px solid #e2e8f0;border-radius:999px;background:white;padding:8px 11px;font-weight:900;white-space:nowrap;cursor:pointer}.chip.active{background:#7c1d1d;color:white}.summary{display:flex;justify-content:space-between;padding:0 12px 9px;font-size:12px;color:#64748b;border-bottom:1px solid #e2e8f0}.list{overflow:auto;background:#f8fafc;padding:10px 12px 18px}.card{background:white;border:1px solid #e5e7eb;border-left:7px solid #94a3b8;border-radius:18px;padding:12px;margin-bottom:10px;box-shadow:0 3px 12px #0001}.ambulance{border-left-color:#dc2626}.health{border-left-color:#15803d}.halt{border-left-color:#92400e}.water{border-left-color:#0284c7}.ctop{display:flex;gap:8px}.ico{font-size:22px}.title{font-weight:950;font-size:15px;line-height:1.25}.dist{margin-left:auto;background:#f1f5f9;border-radius:999px;padding:4px 7px;font-size:12px;font-weight:900;height:max-content}.near{background:#dc2626;color:white}.badge{font-size:11px;font-weight:900;border-radius:999px;padding:4px 7px;background:#f1f5f9}.badge.red{background:#fee2e2;color:#991b1b}.badge.green{background:#dcfce7;color:#166534}.meta{font-size:13px;color:#475569;line-height:1.4;margin-top:8px}.meta b{color:#111827}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.actions a,.actions button{border:0;border-radius:12px;padding:10px 6px;text-decoration:none;text-align:center;font-weight:900;color:#111827;background:#f1f5f9}.call{background:#16a34a!important;color:white!important}.dir{background:#2563eb!important;color:white!important}.share{background:#fff7ed!important;color:#9a3412!important;border:1px solid #fed7aa!important}.modal{display:none;position:fixed;inset:0;background:#0f172a77;z-index:999;align-items:end}.modal.open{display:flex}.modal-card{background:white;width:100%;border-radius:22px 22px 0 0;padding:16px}.field{width:100%;height:46px;border:1px solid #e2e8f0;border-radius:14px;padding:0 12px;font-size:16px;margin:8px 0}.pin{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;border:2px solid white;box-shadow:0 2px 8px #0005}.pin.ambulance{background:#dc2626}.pin.health{background:#15803d}.pin.halt{background:#92400e}.pin.water{background:#0284c7}.pin.other{background:#2563eb}.user-pin{background:#111827;border:3px solid white;width:22px;height:22px;border-radius:50%;box-shadow:0 0 0 7px #2563eb33}@media(min-width:760px){.app{max-width:1180px;margin:0 auto;height:100vh;grid-template-columns:1fr 420px;grid-template-rows:auto auto 1fr}.top,.quick{grid-column:1/3}.mapwrap{grid-column:1}.sheet{grid-column:2;grid-row:3/5;max-height:none;border-radius:0}.grab{display:none}}
  </style>
</head>
<body>
<div class="app">
  <header class="top"><h1>वारी सहाय्य नकाशा</h1><p>जवळची रुग्णवाहिका, डॉक्टर, प्रा. आ. केंद्र आणि मुक्काम मदत शोधा</p></header>
  <section class="quick"><a class="btn red" href="tel:108">🚑 १०८ ला फोन</a><a class="btn green" href="tel:112">🆘 ११२</a><button class="btn blue" onclick="openRoute()">🗺 पालखी मार्ग</button></section>
  <main class="mapwrap"><div id="map"></div><div id="mapStatus" class="status">📍 जवळची मदत शोधण्यासाठी टॅप करा</div><button class="backmap" onclick="showMappedArea()">🗺 मार्गावर परत</button><button class="locate" onclick="locateMe()">📍 माझ्या जवळ</button></main>
  <section class="sheet"><div class="grab"></div><div class="tools"><input id="search" class="search" placeholder="ठिकाण, डॉक्टर, वाहन क्रमांक शोधा…" oninput="refresh()"><div class="chips" id="cats"><button class="chip active" data-cat="all" onclick="setCat('all')">सर्व</button><button class="chip" data-cat="ambulance" onclick="setCat('ambulance')">🚑 रुग्णवाहिका</button><button class="chip" data-cat="doctor" onclick="setCat('doctor')">🩺 डॉक्टर / प्रा. आ. केंद्र</button><button class="chip" data-cat="hospital" onclick="setCat('hospital')">🏥 रुग्णालय</button><button class="chip" data-cat="water" onclick="setCat('water')">💧 पाणी</button><button class="chip" data-cat="halt" onclick="setCat('halt')">⛺ मुक्काम</button></div><div class="chips" id="rads"><button class="chip" data-r="100" onclick="setRadius(100)">१०० मी.</button><button class="chip active" data-r="500" onclick="setRadius(500)">५०० मी.</button><button class="chip" data-r="1000" onclick="setRadius(1000)">१ किमी</button><button class="chip" data-r="5000" onclick="setRadius(5000)">५ किमी</button><button class="chip" data-r="99999999" onclick="setRadius(99999999)">सर्व</button></div></div><div class="summary"><span><b id="count">0</b> मदत केंद्रे</span><span id="gps">GPS सुरू नाही</span></div><div id="list" class="list"></div></section>
</div>
<div id="modal" class="modal" onclick="closeModal(event)"><div class="modal-card"><h2>स्थान शेअर करा / मदत मागा</h2><input id="dindi" class="field" placeholder="दिंडी क्रमांक / नाव / मोबाईल संदर्भ"><select id="issue" class="field"><option>वैद्यकीय आपत्कालीन मदत</option><option>रुग्णवाहिका हवी</option><option>पाणी हवे</option><option>व्यक्ती हरवली</option><option>इतर मदत</option></select><div class="actions"><button onclick="closeModal()">रद्द करा</button><button class="call" onclick="shareCurrentLocation()">शेअर करा</button></div></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./wari-points-1.js"></script><script src="./wari-points-2.js"></script><script src="./wari-points-3.js"></script><script src="./wari-points-4.js"></script><script src="./wari-points-5.js"></script>
<script>
const MASTER_MAP_URL='https://www.google.com/maps/d/u/0/viewer?mid=1tI_g2pw9S8fsQ4Wfz3kPau3dbGotSuw';
const POINTS=JSON.parse((window.WARI_POINT_CHUNKS||[]).join(''));
let map,userLocation=null,userMarker=null,markers=[],cat='all',rad=500,selectedPoint=null;const $=id=>document.getElementById(id);
function icon(p){let t=(p.type||'').toLowerCase();return t.includes('ambulance')?'🚑':t.includes('hospital')||t.includes('rural')?'🏥':t.includes('phc')||t.includes('hbt')?'🩺':t.includes('water')?'💧':t.includes('halt')||t.includes('mukkam')?'⛺':'📍'}
function cls(p){let t=(p.type||'').toLowerCase();return t.includes('ambulance')?'ambulance':t.includes('hospital')||t.includes('phc')||t.includes('hbt')||t.includes('rural')?'health':t.includes('halt')||t.includes('mukkam')?'halt':t.includes('water')?'water':'other'}
function hav(a,b,c,d){let R=6371000,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),q=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return 2*R*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}
function fd(m){return m==null?'—':m<1000?Math.round(m)+' मी.':(m/1000).toFixed(1)+' किमी'}function tel(s){return(s||'').replace(/[^0-9+]/g,'')}function esc(s){return(s||'').toString().replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]))}function openRoute(){window.open(MASTER_MAP_URL,'_blank')}
function setCat(c){cat=c;document.querySelectorAll('#cats .chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));refresh()}function setRadius(r){rad=r;document.querySelectorAll('#rads .chip').forEach(b=>b.classList.toggle('active',+b.dataset.r===r));refresh()}
function showMappedArea(){cat='all';rad=99999999;$('search').value='';document.querySelectorAll('#cats .chip').forEach(b=>b.classList.toggle('active',b.dataset.cat==='all'));document.querySelectorAll('#rads .chip').forEach(b=>b.classList.toggle('active',+b.dataset.r===99999999));refresh();fitMappedArea();$('mapStatus').textContent='संपूर्ण मॅप केलेले क्षेत्र दाखवत आहोत'}
function fitMappedArea(){const valid=POINTS.filter(p=>isFinite(p.lat)&&isFinite(p.lng)).map(p=>[p.lat,p.lng]);if(valid.length){map.fitBounds(L.latLngBounds(valid).pad(0.12))}}
function inCat(p){let t=(p.type||'').toLowerCase();return cat==='all'||(cat==='ambulance'&&t.includes('ambulance'))||(cat==='doctor'&&(t.includes('phc')||t.includes('hbt')))||(cat==='hospital'&&(t.includes('hospital')||t.includes('rural')))||(cat==='water'&&t.includes('water'))||(cat==='halt'&&(t.includes('halt')||t.includes('mukkam')))}
function d(p){return userLocation?hav(userLocation[0],userLocation[1],p.lat,p.lng):null}function dir(p){return`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`}function search(p){let q=$('search').value.trim().toLowerCase();return!q||[p.label,p.type,p.place,p.vehicle,p.doctor,p.pilot,p.base,p.risk].join(' ').toLowerCase().includes(q)}
function visible(){let pts=POINTS.filter(p=>inCat(p)&&search(p)).map((p,i)=>({...p,_idx:i,dist:d(p)}));if(userLocation&&rad<99999999)pts=pts.filter(p=>p.dist!=null&&p.dist<=rad);pts.sort((a,b)=>userLocation?(a.dist??9e9)-(b.dist??9e9):(a.type||'').localeCompare(b.type||'')||(a.label||'').localeCompare(b.label||''));return pts}
function pop(p){let c=tel(p.call),m=[];if(p.vehicle)m.push(`<b>वाहन क्रमांक:</b> ${esc(p.vehicle)}`);if(p.doctor)m.push(`<b>डॉक्टर/EMSO:</b> ${esc(p.doctor)}`);if(p.place)m.push(`<b>ठिकाण:</b> ${esc(p.place)}`);return`<b>${icon(p)} ${esc(p.label)}</b><br>${m.join('<br>')}<br>${c?`<a href="tel:${c}">फोन करा</a> `:''}<a target="_blank" href="${dir(p)}">दिशा</a>`}
function draw(pts){markers.forEach(m=>map.removeLayer(m));markers=[];pts.forEach(p=>{let m=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',html:`<div class="pin ${cls(p)}">${icon(p)}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map).bindPopup(pop(p));markers.push(m)})}
function line(l,v){return v?`<div><b>${l}</b> ${esc(v)}</div>`:''}
function render(pts){let list=$('list');if(!pts.length){list.innerHTML='<div>या फिल्टरमध्ये कोणतेही मदत केंद्र सापडले नाही.</div>';return}list.innerHTML=pts.slice(0,60).map(p=>{let c=tel(p.call),near=p.dist!=null&&p.dist<=100,verify=p.ready==='verify';return`<article class="card ${cls(p)}"><div class="ctop"><div class="ico">${icon(p)}</div><div style="flex:1"><div class="title">${esc(p.label)}</div><span class="badge ${verify?'red':'green'}">${verify?'पडताळणी आवश्यक':'सार्वजनिक तयार'}</span>${p.mems?` <span class="badge">${esc(p.mems)}</span>`:''}</div><div class="dist ${near?'near':''}">${fd(p.dist)}</div></div><div class="meta">${line('ठिकाण:',p.place)}${line('वाहन क्रमांक:',p.vehicle)}${line('डॉक्टर/EMSO:',p.doctor)}${line('बेस:',p.base)}${line('पायलट/EA:',p.pilot)}</div><div class="actions">${c?`<a class="call" href="tel:${c}">📞 फोन करा</a>`:`<button>📞 नंबर नाही</button>`}<a class="dir" target="_blank" href="${dir(p)}">🧭 दिशा</a><button class="share" onclick="openShare(${p._idx})">📤 शेअर</button></div></article>`}).join('')}
function refresh(){let pts=visible();$('count').textContent=pts.length;$('gps').textContent=userLocation?'अंतरानुसार क्रम':'अंतर पाहण्यासाठी माझ्या जवळ टॅप करा';$('mapStatus').textContent=userLocation?`${pts.length} मदत केंद्रे दाखवत आहोत`:'सध्याचे स्थान वापरण्यासाठी 📍 माझ्या जवळ टॅप करा';draw(pts.slice(0,120));render(pts)}
function locateMe(){if(!navigator.geolocation){$('mapStatus').textContent='स्थान सुविधा उपलब्ध नाही';return}$('mapStatus').textContent='GPS स्थान घेत आहोत…';navigator.geolocation.getCurrentPosition(pos=>{userLocation=[pos.coords.latitude,pos.coords.longitude];if(userMarker)map.removeLayer(userMarker);userMarker=L.marker(userLocation,{icon:L.divIcon({className:'',html:'<div class="user-pin"></div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map).bindPopup('आपण येथे आहात').openPopup();map.setView(userLocation,16);$('gps').textContent=`अचूकता ${Math.round(pos.coords.accuracy)} मी.`;refresh()},()=>{$('mapStatus').textContent='GPS मिळाले नाही. Location permission द्या.'},{enableHighAccuracy:true,timeout:15000,maximumAge:20000})}
function openShare(i){selectedPoint=POINTS[i]?.label||null;$('modal').classList.add('open')}function closeModal(e){if(!e||e.target.id==='modal'||e.target.textContent==='रद्द करा')$('modal').classList.remove('open')}
function shareCurrentLocation(){let d=$('dindi').value.trim(),issue=$('issue').value,loc=userLocation?`https://www.google.com/maps/search/?api=1&query=${userLocation[0]},${userLocation[1]}`:'स्थान उपलब्ध नाही',msg=`वारी मदत विनंती%0A${encodeURIComponent(issue)}%0A${d?encodeURIComponent('दिंडी/नाव: '+d)+'%0A':''}${selectedPoint?encodeURIComponent('जवळचे मदत केंद्र: '+selectedPoint)+'%0A':''}${encodeURIComponent('माझे स्थान: ')}${encodeURIComponent(loc)}`;if(navigator.share)navigator.share({title:'वारी मदत विनंती',text:decodeURIComponent(msg.replaceAll('%0A','\n'))}).catch(()=>{});else window.open('https://wa.me/?text='+msg,'_blank');closeModal()}
function init(){map=L.map('map',{zoomControl:false}).setView([18.4193602268,74.02765555],10);L.control.zoom({position:'bottomleft'}).addTo(map);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);refresh();setTimeout(fitMappedArea,250)}init();
</script>
</body>
</html>
