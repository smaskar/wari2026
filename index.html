<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>वारी सहाय्य</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#f27405" />
  <style>
    :root{--orange:#f27405;--ink:#23160d;--shadow:0 22px 55px rgba(42,24,8,.18)}
    *{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;background:radial-gradient(circle at top,#fff7df,#e7d7bb);font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;color:var(--ink)}iframe{border:0;display:block}.mobile-frame{display:block;width:100%;height:100dvh;min-height:100vh}.desktop-shell{display:none}
    @media (min-width:900px){body{overflow:hidden}.mobile-frame{display:none}.desktop-shell{display:grid;grid-template-columns:470px 1fr;gap:22px;height:100dvh;padding:18px;max-width:1500px;margin:0 auto}.phone-wrap{height:calc(100dvh - 36px);border-radius:30px;overflow:hidden;background:#fff8e8;box-shadow:var(--shadow)}.phone-wrap iframe{width:100%;height:100%}.map-wrap{height:calc(100dvh - 36px);display:grid;grid-template-rows:auto 1fr;border-radius:30px;overflow:hidden;background:#fff8e8;box-shadow:var(--shadow)}.desktop-head{padding:18px 20px;background:linear-gradient(135deg,#f78400,#ef7000);color:white}.desktop-head h1{margin:0;font-size:26px;line-height:1.1;font-weight:950}.desktop-head p{margin:6px 0 14px;font-weight:800;opacity:.92}.desk-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}.desk-btn{border:0;border-radius:18px;background:white;color:#9a3a00;padding:15px 16px;font-weight:950;font-size:17px;text-align:left;box-shadow:0 12px 24px rgba(82,43,5,.18);cursor:pointer}.desk-btn span{display:block;font-size:12px;color:#806f5a;margin-top:3px}.map-frame{width:100%;height:100%;background:#eadfc8}}
  </style>
</head>
<body>
  <iframe class="mobile-frame" src="./app.html?v=osm10" title="वारी सहाय्य" allow="geolocation; clipboard-write; web-share"></iframe>

  <main class="desktop-shell">
    <section class="phone-wrap">
      <iframe id="appFrame" src="./app.html?v=osm10" title="वारी सहाय्य मोबाइल UI" allow="geolocation; clipboard-write; web-share"></iframe>
    </section>
    <section class="map-wrap">
      <div class="desktop-head">
        <h1>वारी सहाय्य · मदत नकाशा</h1>
        <p>श्री संत ज्ञानेश्वर महाराज आणि जगद्गुरू श्री संत तुकाराम महाराज पालखी मार्गासाठी आमचे मदत केंद्र.</p>
        <div class="desk-actions">
          <button class="desk-btn" onclick="callApp('locateMe')">📍 माझ्या जवळ मदत शोधा<span>डाव्या app map मध्ये जवळची मदत दाखवा</span></button>
          <button class="desk-btn" onclick="showDesktopMap()">🗺 नकाशा दाखवा<span>उजव्या मदत नकाशावर सर्व points दाखवा</span></button>
        </div>
      </div>
      <!-- Google My Map is intentionally disabled for now. Kept for later reference: https://www.google.com/maps/d/u/0/embed?mid=1151dFIqz_htDjnDRMRnDqnJQE9JW3VQ -->
      <iframe id="osmFrame" class="map-frame" src="./map.html?v=osm10" title="वारी सहाय्य मदत नकाशा" allow="geolocation; clipboard-write; web-share" loading="lazy"></iframe>
    </section>
  </main>

  <script>
    function setDesktopPalkhi(p){
      var m=document.getElementById('osmFrame');
      if(m && m.contentWindow) m.contentWindow.postMessage({type:'PALKHI_FILTER',palkhi:p||'all'},'*');
    }
    function showDesktopMap(){
      var m=document.getElementById('osmFrame');
      if(!m) return;
      try{
        m.contentWindow.postMessage({type:'RESET_MAP'},'*');
        m.focus();
      }catch(e){console.warn('Unable to control desktop map',e);}
    }
    function backToAppMap(frame){
      try{
        var w=frame.contentWindow, doc=frame.contentDocument || w.document;
        if(!w || !doc) return;
        if(typeof w.openMapPanel==='function') w.openMapPanel();
        if(typeof w.showMappedArea==='function') w.showMappedArea();
        setTimeout(function(){
          try{
            var panel=doc.getElementById('mapPanel');
            var map=w.map;
            if(panel) panel.scrollIntoView({behavior:'smooth',block:'start'});
            if(map && map.invalidateSize) map.invalidateSize(true);
            if(typeof w.fitMappedArea==='function') w.fitMappedArea();
          }catch(e){}
        },120);
      }catch(e){console.warn('Unable to go back to app map',e);}
    }
    function installAppButtons(frame){
      try{
        var doc=frame.contentDocument || frame.contentWindow.document;
        if(!doc || !doc.body || doc.body.dataset.backMapReady==='yes') return;
        doc.body.dataset.backMapReady='yes';
        doc.addEventListener('click',function(e){
          var b=e.target.closest && e.target.closest('button');
          if(!b) return;
          var t=(b.textContent||'').trim();
          if(/मार्गावर परत|सर्व points|नकाशा दाखवा/.test(t)){
            setTimeout(function(){backToAppMap(frame);},40);
          }
        },true);
      }catch(e){console.warn('Unable to install back-to-map buttons',e);}
    }
    function installPalkhiSync(frame){
      try{
        var doc=frame.contentDocument || frame.contentWindow.document;
        if(!doc || !doc.body || doc.body.dataset.palkhiSyncReady==='yes') return;
        doc.body.dataset.palkhiSyncReady='yes';
        doc.addEventListener('click',function(e){
          var tab=e.target.closest && e.target.closest('.tab');
          if(tab && tab.dataset && tab.dataset.p){setDesktopPalkhi(tab.dataset.p);}
        },true);
      }catch(e){console.warn('Unable to sync palkhi tabs',e);}
    }
    function installFrame(frame){
      function run(){installPalkhiSync(frame);installAppButtons(frame);}
      frame.addEventListener('load',run);
      setTimeout(run,500);
      setTimeout(run,1600);
    }
    document.querySelectorAll('iframe').forEach(installFrame);
    function callApp(fn){
      var frame=document.getElementById('appFrame');
      if(!frame || !frame.contentWindow) return;
      try{
        if(typeof frame.contentWindow[fn]==='function') frame.contentWindow[fn]();
        if(fn==='openMapPanel') setTimeout(function(){backToAppMap(frame);},80);
        frame.focus();
      }catch(e){console.warn('Unable to call app function', e);}
    }
    function forceHelpMap(){
      document.querySelectorAll('iframe').forEach(function(frame){
        var src=frame.getAttribute('src')||'';
        if(src.indexOf('google.com/maps')>-1 || src.indexOf('maps/d/u')>-1){
          frame.setAttribute('src','./map.html?v=osm10');
          frame.setAttribute('title','वारी सहाय्य मदत नकाशा');
        }
      });
    }
    forceHelpMap();
    setTimeout(forceHelpMap,500);
    setTimeout(forceHelpMap,1500);
    function registerOfflineSupport(){
      if(!('serviceWorker' in navigator)) return;
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('./sw.js?v=osm10').then(function(reg){
          function syncNow(){
            if(reg.update) reg.update();
            if(navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'SYNC_NOW'});}
          }
          if(navigator.onLine) syncNow();
          window.addEventListener('online', syncNow);
        }).catch(function(e){console.warn('Offline support not installed', e);});
      });
    }
    registerOfflineSupport();
  </script>
</body>
</html>
