<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>वारी सहाय्य</title>
  <style>
    :root{--orange:#f27405;--cream:#f3ead8;--ink:#23160d;--muted:#806f5a;--line:#eee2cf;--shadow:0 22px 55px rgba(42,24,8,.18)}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;min-height:100%;background:radial-gradient(circle at top,#fff7df,#e7d7bb);font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;color:var(--ink)}
    iframe{border:0;display:block}
    .mobile-frame{display:block;width:100%;height:100dvh;min-height:100vh}
    .desktop-shell{display:none}
    @media (min-width:900px){
      body{overflow:hidden}
      .mobile-frame{display:none}
      .desktop-shell{display:grid;grid-template-columns:470px 1fr;gap:22px;height:100dvh;padding:18px;max-width:1500px;margin:0 auto}
      .phone-wrap{height:calc(100dvh - 36px);border-radius:30px;overflow:hidden;background:#fff8e8;box-shadow:var(--shadow)}
      .phone-wrap iframe{width:100%;height:100%}
      .map-wrap{height:calc(100dvh - 36px);display:grid;grid-template-rows:auto 1fr;border-radius:30px;overflow:hidden;background:#fff8e8;box-shadow:var(--shadow)}
      .desktop-head{padding:18px 20px;background:linear-gradient(135deg,#f78400,#ef7000);color:white}
      .desktop-head h1{margin:0;font-size:26px;line-height:1.1;font-weight:950}
      .desktop-head p{margin:6px 0 14px;font-weight:800;opacity:.92}
      .desk-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      .desk-btn{border:0;border-radius:18px;background:white;color:#9a3a00;padding:15px 16px;font-weight:950;font-size:17px;text-align:left;box-shadow:0 12px 24px rgba(82,43,5,.18);cursor:pointer}
      .desk-btn span{display:block;font-size:12px;color:#806f5a;margin-top:3px}
      .map-frame{width:100%;height:100%;background:#eadfc8}
    }
  </style>
</head>
<body>
  <iframe class="mobile-frame" src="./app.html" title="वारी सहाय्य" allow="geolocation; clipboard-write; web-share"></iframe>

  <main class="desktop-shell">
    <section class="phone-wrap">
      <iframe id="appFrame" src="./app.html" title="वारी सहाय्य मोबाइल UI" allow="geolocation; clipboard-write; web-share"></iframe>
    </section>
    <section class="map-wrap">
      <div class="desktop-head">
        <h1>वारी सहाय्य · मदत नकाशा</h1>
        <p>श्री संत ज्ञानेश्वर महाराज आणि जगद्गुरू श्री संत तुकाराम महाराज पालखी मार्गासाठी आमचे मदत केंद्र.</p>
        <div class="desk-actions">
          <button class="desk-btn" onclick="callApp('locateMe')">📍 माझ्या जवळ मदत शोधा<span>GPS वापरून जवळची मदत app मध्ये दाखवा</span></button>
          <button class="desk-btn" onclick="callApp('openMapPanel')">🗺 नकाशा दाखवा<span>आमचे मदत केंद्र नकाशावर पाहा</span></button>
        </div>
      </div>
      <iframe class="map-frame" src="https://www.google.com/maps/d/u/0/embed?mid=1151dFIqz_htDjnDRMRnDqnJQE9JW3VQ&ll=18.41973967893517%2C74.3956&z=10" title="वारी सहाय्य मदत नकाशा" allowfullscreen loading="lazy"></iframe>
    </section>
  </main>

  <script>
    function cleanAppText(doc){
      if(!doc || !doc.body) return;
      var walker=doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
      var n;
      while(n=walker.nextNode()){
        n.nodeValue=n.nodeValue
          .replace(/आमचे Google My Map support points/g,'आमचे मदत केंद्र नकाशावर पाहा')
          .replace(/वारी सहाय्य Google My Map/g,'वारी सहाय्य मदत नकाशा')
          .replace(/Google Map/g,'मोठा नकाशा');
      }
    }

    function telHref(raw){
      var s=(raw||'').replace(/[^0-9+]/g,'');
      if(s.indexOf('+')===0) return s;
      if(s.length===10 && /^[6-9]/.test(s)) return '+91'+s;
      return s;
    }

    function escHtml(s){
      return (s||'').toString().replace(/[&<>\"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[ch]||ch;});
    }

    function makePhoneLink(num){
      var clean=(num||'').trim();
      return '<a class="phone-pill" href="tel:'+telHref(clean)+'">📞 '+escHtml(clean)+'</a>';
    }

    function addCardFormatStyle(doc){
      if(doc.getElementById('wariCardFormatStyle')) return;
      var st=doc.createElement('style');
      st.id='wariCardFormatStyle';
      st.textContent='.card.formatted-card{padding:14px!important}.card.formatted-card .ct,.card.formatted-card .meta{display:none!important}.formatted-title{font-size:16px;font-weight:950;line-height:1.25;color:#23160d}.formatted-vehicle{font-size:13px;font-weight:900;margin-top:8px;color:#4b3b2b}.formatted-service{margin-top:10px;padding:8px 10px;border-radius:13px;background:#f3ead8;font-size:12px;font-weight:950;color:#5a4430}.formatted-field{margin-top:8px;font-size:13px;line-height:1.35;color:#4b3b2b}.formatted-field b{color:#23160d}.contact-section{margin-top:12px}.contact-heading{font-size:13px;font-weight:950;color:#9a3a00;margin-bottom:6px}.contact-line{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;margin-top:6px;padding:7px 8px;border-radius:12px;background:#fff8e8;border:1px solid #f1e5d1}.contact-name{font-size:13px;font-weight:900;color:#3a2b1d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.phone-pill{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:5px 9px;border-radius:999px;background:#159653;color:#fff!important;text-decoration:none!important;font-size:12px;font-weight:950;white-space:nowrap}@media(max-width:370px){.contact-line{grid-template-columns:1fr}.phone-pill{width:max-content}}';
      doc.head.appendChild(st);
    }

    function splitContacts(value){
      var phoneRe=/(?:\+?91[\s-]?)?[6-9]\d{9}|0\d{2,4}[\s-]?\d{6,8}|1800[\s-]?\d{2,4}[\s-]?\d{3,4}|155388|1075|1077|104|102/g;
      return (value||'').split(/\s*;\s*/).map(function(part){
        part=part.trim();
        if(!part) return null;
        var nums=part.match(phoneRe)||[];
        var name=part.replace(phoneRe,'').replace(/[()]/g,'').replace(/\s+/g,' ').replace(/[,:;—-]+$/,'').trim();
        if(!name && nums.length) name='संपर्क';
        return {name:name,phone:nums[0]||''};
      }).filter(Boolean);
    }

    function contactSection(title, value){
      var contacts=splitContacts(value);
      if(!contacts.length) return '';
      return '<div class="contact-section"><div class="contact-heading">'+escHtml(title)+'</div>'+contacts.map(function(c){
        return '<div class="contact-line"><span class="contact-name">'+escHtml(c.name)+'</span>'+(c.phone?makePhoneLink(c.phone):'')+'</div>';
      }).join('')+'</div>';
    }

    function serviceNameFromBadge(text){
      if(text.indexOf('तुकाराम')>-1) return 'जगद्गुरू श्री संत तुकाराम महाराज';
      if(text.indexOf('ज्ञानेश्वर')>-1) return 'श्री संत ज्ञानेश्वर महाराज';
      return text;
    }

    function formatHelpCards(doc){
      if(!doc || !doc.body) return;
      addCardFormatStyle(doc);
      doc.querySelectorAll('.card').forEach(function(card){
        if(card.dataset.prettyFormatted==='yes') return;
        var titleNode=card.querySelector('.ttl');
        var meta=card.querySelector('.meta');
        var act=card.querySelector('.act');
        if(!titleNode || !meta || !act) return;
        var clone=titleNode.cloneNode(true);
        var badges=Array.from(clone.querySelectorAll('.badge')).map(function(b){return b.textContent.trim();}).filter(Boolean);
        clone.querySelectorAll('.badges').forEach(function(x){x.remove();});
        var baseTitle=clone.textContent.trim().replace(/\s+/g,' ');
        var typeIcon=(card.querySelector('.ico')||{}).textContent||'';
        var serviceType=typeIcon.indexOf('🚑')>-1?'रुग्णवाहिका सेवा':typeIcon.indexOf('🏥')>-1?'रुग्णालय सेवा':typeIcon.indexOf('🩺')>-1?'डॉक्टर / आरोग्य सेवा':typeIcon.indexOf('⛺')>-1?'मुक्काम सेवा':'मदत केंद्र';
        var lines={};
        meta.querySelectorAll('div').forEach(function(d){
          var b=d.querySelector('b');
          if(!b) return;
          var label=b.textContent.trim().replace(/:$/,'');
          var value=d.textContent.replace(b.textContent,'').trim();
          lines[label]=value;
        });
        var palkhi=serviceNameFromBadge(badges[0]||'');
        var ready=badges[1]||'';
        var mems=badges[2]||'';
        var serviceLine=[palkhi,ready,mems?('('+mems+')'):''].filter(Boolean).join(' – ');
        var html='';
        html+='<div class="formatted-title">'+escHtml(serviceType+' – '+baseTitle)+'</div>';
        if(lines['वाहन क्रमांक']) html+='<div class="formatted-vehicle"><b>वाहन क्रमांक:</b> '+escHtml(lines['वाहन क्रमांक'])+'</div>';
        if(serviceLine) html+='<div class="formatted-service"><b>सेवा:</b> '+escHtml(serviceLine)+'</div>';
        if(lines['ठिकाण']) html+='<div class="formatted-field"><b>ठिकाण:</b> '+escHtml(lines['ठिकाण'])+'</div>';
        if(lines['बेस']) html+='<div class="formatted-field"><b>बेस:</b> '+escHtml(lines['बेस'])+'</div>';
        html+=contactSection('डॉक्टर / EMSO', lines['डॉक्टर/EMSO']||'');
        html+=contactSection('पायलट / EA', lines['पायलट/EA']||'');
        if(lines['तारीख']) html+='<div class="formatted-field"><b>तारीख:</b> '+escHtml(lines['तारीख'])+'</div>';
        if(lines['टप्पा']) html+='<div class="formatted-field"><b>टप्पा:</b> '+escHtml(lines['टप्पा'])+'</div>';
        var wrap=doc.createElement('div');
        wrap.className='formatted-body';
        wrap.innerHTML=html;
        card.insertBefore(wrap,act);
        card.classList.add('formatted-card');
        card.dataset.prettyFormatted='yes';
      });
    }

    function installCardFormatObserver(doc){
      if(!doc || !doc.body || doc.body.dataset.cardFormatReady==='yes') return;
      doc.body.dataset.cardFormatReady='yes';
      formatHelpCards(doc);
      var pending=false;
      new MutationObserver(function(){
        if(pending) return;
        pending=true;
        setTimeout(function(){pending=false;formatHelpCards(doc);},80);
      }).observe(doc.body,{childList:true,subtree:true});
    }

    function expandMapByDefault(frame, doc){
      if(!doc || !doc.body) return;
      var page=doc.getElementById('page');
      if(page && !page.classList.contains('map-open')) page.classList.add('map-open');
      try{
        if(frame && frame.contentWindow && typeof frame.contentWindow.refresh==='function') frame.contentWindow.refresh();
      }catch(e){}
    }
    function installFrameEnhancements(frame){
      if(!frame) return;
      frame.addEventListener('load', function(){
        try{
          var doc=frame.contentDocument || frame.contentWindow.document;
          cleanAppText(doc);
          expandMapByDefault(frame, doc);
          installCardFormatObserver(doc);
          formatHelpCards(doc);
          var help=doc.querySelector('.helpline');
          if(!help || help.dataset.autoCloseReady==='yes') return;
          help.dataset.autoCloseReady='yes';
          doc.addEventListener('click', function(e){
            if(help.open && !help.contains(e.target)) help.open=false;
          }, true);
        }catch(e){console.warn('Unable to install frame enhancements', e);}
      });
    }
    document.querySelectorAll('iframe').forEach(function(frame){installFrameEnhancements(frame);});

    function callApp(fn){
      var frame=document.getElementById('appFrame');
      if(!frame || !frame.contentWindow) return;
      try{
        var doc=frame.contentDocument || frame.contentWindow.document;
        cleanAppText(doc);
        expandMapByDefault(frame, doc);
        installCardFormatObserver(doc);
        formatHelpCards(doc);
        var help=doc.querySelector('.helpline');
        if(help) help.open=false;
        if(typeof frame.contentWindow[fn]==='function') frame.contentWindow[fn]();
        setTimeout(function(){cleanAppText(doc);expandMapByDefault(frame, doc);formatHelpCards(doc);},120);
        frame.focus();
      }catch(e){console.warn('Unable to call app function', e);}
    }
  </script>
</body>
</html>
