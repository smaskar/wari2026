<!doctype html><html lang="mr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>वारी सहाय्य</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>:root{--o:#f27405;--cream:#f3ead8;--ink:#23160d;--muted:#7a6d5c;--red:#e52920;--green:#1f9d63;--blue:#2f6fd6;--line:#eee2cf}*{box-sizing:border-box}html{background:var(--cream)}body{margin:0;overflow-x:hidden;font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;background:#e9dcc5;color:var(--ink)}button{font-family:inherit}.page{width:100%;max-width:470px;min-height:100dvh;margin:0 auto;background:linear-gradient(#fff8e8,#f6ecd9);overflow:hidden;box-shadow:0 30px 90px #24180c33}.hero{background:linear-gradient(#f57900,#ef7000);color:white;border-radius:0 0 30px 30px;padding:12px 20px 22px}.top{display:flex;justify-content:space-between;font-weight:900;font-size:13px;margin-bottom:18px}.hero h1{font-size:32px;margin:0 0 7px;font-weight:950}.hero p{font-size:14px;margin:0;font-weight:800}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:16px}.tab{border:1px solid #ffffff55;border-radius:999px;background:#ffffff22;color:white;padding:9px 6px;font-size:12px;font-weight:950}.tab.active{background:white;color:#9a3a00}.sec{padding:18px 18px 0}.k{font-size:13px;color:#9c7c51;font-weight:950;letter-spacing:.08em;margin:0 0 12px}.em{display:grid;grid-template-columns:1fr 1fr;gap:13px}.em a{min-height:124px;border-radius:22px;color:white;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:950;box-shadow:0 15px 28px #4628122e}.red{background:#e52920}.dark{background:#2a2018}.num{font-size:34px}.near{width:100%;margin-top:15px;border:0;border-radius:20px;background:#f27405;color:white;display:flex;gap:13px;align-items:center;padding:17px 18px;font-weight:950;text-align:left}.near i{font-style:normal;width:42px;height:42px;border-radius:50%;background:#ffffff35;display:grid;place-items:center;font-size:23px}.near b{display:block;font-size:19px}.near span span{display:block;font-size:12px;opacity:.9}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.help{border:0;background:#fffef9;border-radius:21px;padding:18px 10px;min-height:145px;text-align:center;box-shadow:0 14px 30px #46281222;color:var(--ink);font-weight:950}.help.active{outline:3px solid #f2740577}.hi{width:54px;height:54px;border-radius:18px;margin:0 auto 10px;display:grid;place-items:center;font-size:27px}.hred{background:#ffe9e8;color:#e52920}.hgreen{background:#e9f8f0;color:#14824e}.hblue{background:#e9f1ff;color:#2f6fd6}.hamb{background:#fff4dc;color:#9b5b00}.ht{font-size:19px}.hs{font-size:12px;color:var(--muted)}.pill{margin:10px auto 0;width:max-content;border-radius:999px;padding:5px 10px;background:#fff1ec;color:#d64026;font-size:12px}.toolbar{padding:16px 18px 0}.search{width:100%;height:46px;border:1px solid var(--line);border-radius:16px;padding:0 14px;font-size:16px;background:#fffef9;font-weight:750}.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px}.chip{border:1px solid var(--line);background:#fffef9;color:#4c3c2a;border-radius:999px;padding:9px 12px;font-weight:950;white-space:nowrap}.chip.active{background:#2a2018;color:white}.mapcard{margin:14px 18px 0;background:white;border-radius:22px;overflow:hidden;box-shadow:0 18px 40px #452a1029}.mh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:950}.mh small{display:block;color:#7a6d5c;font-size:11px}.ma{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.mini{border:0;border-radius:999px;background:#fff3e5;color:#a44900;font-weight:950;padding:9px 11px}#map{height:255px;width:100%;background:#eadfc8}.sum{display:flex;justify-content:space-between;padding:12px 18px 8px;color:#7a6d5c;font-size:13px;font-weight:850}.list{padding:0 18px 28px}.card{background:#fffef9;border:1px solid var(--line);border-left:7px solid #b9a68b;border-radius:20px;padding:13px;margin-top:10px;box-shadow:0 10px 24px #452a101a}.ambulance{border-left-color:#e52920}.health{border-left-color:#1f9d63}.halt{border-left-color:#9b5b00}.water{border-left-color:#2f8fcf}.ct{display:flex;gap:10px}.ico{font-size:24px;width:34px}.ttl{font-weight:950;font-size:15px;line-height:1.25;flex:1;min-width:0}.dist{background:#f3ead8;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:950;height:max-content;white-space:nowrap}.badges{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}.badge{font-size:11px;font-weight:950;border-radius:999px;padding:4px 8px;background:#f3ead8;color:#5a4430}.ok{background:#e5f7ec;color:#168452}.warn{background:#ffe9e8;color:#b51d18}.meta{font-size:13px;color:#5b4a37;line-height:1.42;margin-top:9px;overflow-wrap:anywhere}.act{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}.act a,.act button{border:0;border-radius:13px;padding:10px 6px;text-align:center;text-decoration:none;font-weight:950;background:#f4ecd9;color:#24170c}.call{background:#159653!important;color:white!important}.dir{background:#2f6fd6!important;color:white!important}.share{background:#fff3e5!important;color:#a44900!important;border:1px solid #ffd8a8!important}.pin{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:white;border:2px solid white;box-shadow:0 2px 9px #0005}.pin.ambulance{background:#e52920}.pin.health{background:#1f9d63}.pin.halt{background:#9b5b00}.pin.other{background:#2f6fd6}.userpin{background:#111827;border:3px solid white;width:22px;height:22px;border-radius:50%;box-shadow:0 0 0 7px #2f6fd640}.modal{display:none;position:fixed;inset:0;background:#23160d88;z-index:999;align-items:end}.modal.open{display:flex}.modal-card{width:100%;max-width:470px;margin:0 auto;background:#fffef9;border-radius:24px 24px 0 0;padding:18px}.field{width:100%;height:46px;border:1px solid var(--line);border-radius:14px;padding:0 12px;font-size:16px;margin:8px 0;background:white}</style></head><body><div class="page"><header class="hero"><div class="top"><span id="clock">6:24</span><span>ऑफलाइन तयार ▭</span></div><h1>वारी सहाय्य</h1><p>दोन्ही पालख्यांसाठी जवळची मदत, एका टॅपवर</p><div class="tabs" id="palkhiSwitch"><button class="tab active" data-p="all" onclick="setPalkhi('all')">दोन्ही</button><button class="tab" data-p="dnyaneshwar" onclick="setPalkhi('dnyaneshwar')">ज्ञानेश्वर माऊली</button><button class="tab" data-p="tukaram" onclick="setPalkhi('tukaram')">तुकाराम महाराज</button></div></header><section class="sec"><p class="k">तातडीची मदत · EMERGENCY</p><div class="em"><a class="red" href="tel:108"><span>🚑</span><span class="num">१०८</span><span>रुग्णवाहिका</span></a><a class="dark" href="tel:112"><span>🛡️</span><span class="num">११२</span><span>आपत्कालीन</span></a></div><button class="near" onclick="locateMe()"><i>📍</i><span><b>माझ्या जवळ मदत शोधा</b><span>Find help nearest to me</span></span></button></section><section class="sec"><p class="k">कशाची गरज आहे? · CHOOSE HELP</p><div class="grid"><button class="help" data-cat="ambulance" onclick="chooseHelp('ambulance')"><div class="hi hred">🚑</div><div class="ht">रुग्णवाहिका</div><div class="hs">Ambulance</div><div id="countAmb" class="pill">0</div></button><button class="help" data-cat="doctor" onclick="chooseHelp('doctor')"><div class="hi hgreen">🧑‍⚕️</div><div class="ht">डॉक्टर</div><div class="hs">Doctor / PHC</div><div id="countDoc" class="pill">0</div></button><button class="help" data-cat="hospital" onclick="chooseHelp('hospital')"><div class="hi hblue">🏥</div><div class="ht">रुग्णालय</div><div class="hs">Hospital</div><div id="countHosp" class="pill">0</div></button><button class="help" data-cat="halt" onclick="chooseHelp('halt')"><div class="hi hamb">⛺</div><div class="ht">मुक्काम</div><div class="hs">Mukkam</div><div id="countHalt" class="pill">0</div></button></div></section><div class="toolbar"><input id="search" class="search" placeholder="ठिकाण, डॉक्टर, वाहन क्रमांक शोधा…" oninput="refresh()"><div class="chips" id="rads"><button class="chip" data-r="100" onclick="setRadius(100)">१०० मी.</button><button class="chip active" data-r="500" onclick="setRadius(500)">५०० मी.</button><button class="chip" data-r="1000" onclick="setRadius(1000)">१ किमी</button><button class="chip" data-r="5000" onclick="setRadius(5000)">५ किमी</button><button class="chip" data-r="99999999" onclick="setRadius(99999999)">सर्व</button></div></div><section class="mapcard" id="mapPanel"><div class="mh"><span>मदत नकाशा<small id="palkhiTitle">दोन्ही पालख्या</small></span><div class="ma"><button class="mini" onclick="showMappedArea()">🗺 मार्गावर परत</button><button class="mini" onclick="openRoute()">पालखी मार्ग</button></div></div><div id="map"></div></section><div class="sum"><span><b id="count">0</b> मदत केंद्रे</span><span id="gps">GPS सुरू नाही</span></div><div id="list" class="list"></div></div><div id="modal" class="modal" onclick="closeModal(event)"><div class="modal-card"><h2>स्थान शेअर करा / मदत मागा</h2><input id="dindi" class="field" placeholder="दिंडी क्रमांक / नाव / मोबाईल संदर्भ"><select id="issue" class="field"><option>वैद्यकीय आपत्कालीन मदत</option><option>रुग्णवाहिका हवी</option><option>पाणी हवे</option><option>व्यक्ती हरवली</option><option>इतर मदत</option></select><div class="act"><button onclick="closeModal()">रद्द करा</button><button class="call" onclick="shareCurrentLocation()">शेअर करा</button></div></div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="./wari-points-1.js"></script><script src="./wari-points-2.js"></script><script src="./wari-points-3.js"></script><script src="./wari-points-4.js"></script><script src="./wari-points-5.js"></script><script src="./wari-points-tukaram.js"></script><script>const MASTER_MAP_URL='https://www.google.com/maps/d/u/0/viewer?mid=1tI_g2pw9S8fsQ4Wfz3kPau3dbGotSuw',names={all:'दोन्ही पालख्या',dnyaneshwar:'संत ज्ञानेश्वर महाराज पालखी',tukaram:'संत तुकाराम महाराज पालखी'};let rawD=JSON.parse((window.WARI_POINT_CHUNKS||[]).join('')).map(x=>({p:'dnyaneshwar',t:x.type,l:x.label,pl:x.place,b:x.base,v:x.vehicle,m:x.mems,c:x.call,d:x.doctor,pi:x.pilot,lat:x.lat,lng:x.lng,r:x.ready})),rawT=window.WARI_TUKARAM_POINTS||[],POINTS=[...rawD,...rawT].map(x=>({palkhi:x.p||'dnyaneshwar',type:x.t||'',label:x.l||'',place:x.pl||'',base:x.b||'',vehicle:x.v||'',mems:x.m||'',call:x.c||'',doctor:x.d||'',pilot:x.pi||'',lat:+x.lat,lng:+x.lng,ready:x.r||'',date:x.dt||'',phase:x.ph||''}));let map,userLocation=null,userMarker=null,markers=[],cat='all',rad=500,currentPalkhi='all',selectedPoint=null;const $=id=>document.getElementById(id);function tick(){clock.textContent=new Date().toLocaleTimeString('mr-IN',{hour:'numeric',minute:'2-digit'})}tick();setInterval(tick,3e4);function icon(p){let t=(p.type||'').toLowerCase();return t.includes('ambulance')?'🚑':t.includes('hospital')||t.includes('rural')?'🏥':t.includes('phc')||t.includes('hbt')?'🩺':t.includes('water')?'💧':t.includes('halt')||t.includes('mukkam')?'⛺':'📍'}function cls(p){let t=(p.type||'').toLowerCase();return t.includes('ambulance')?'ambulance':t.includes('hospital')||t.includes('phc')||t.includes('hbt')||t.includes('rural')?'health':t.includes('halt')||t.includes('mukkam')?'halt':t.includes('water')?'water':'other'}function hav(a,b,c,d){let R=6371000,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),q=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return 2*R*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}function fd(m){return m==null?'—':m<1000?Math.round(m)+' मी.':(m/1000).toFixed(1)+' किमी'}function tel(s){return(s||'').replace(/[^0-9+]/g,'')}function esc(s){return(s||'').toString().replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]))}function openRoute(){open(MASTER_MAP_URL,'_blank')}function setPalkhi(p){currentPalkhi=p;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.p===p));palkhiTitle.textContent=names[p];refresh();fitMappedArea()}function chooseHelp(c){cat=c;document.querySelectorAll('.help').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));refresh();mapPanel.scrollIntoView({behavior:'smooth'})}function setRadius(r){rad=r;document.querySelectorAll('#rads .chip').forEach(b=>b.classList.toggle('active',+b.dataset.r===r));refresh()}function showMappedArea(){cat='all';rad=99999999;search.value='';document.querySelectorAll('.help').forEach(b=>b.classList.remove('active'));document.querySelectorAll('#rads .chip').forEach(b=>b.classList.toggle('active',+b.dataset.r===99999999));refresh();fitMappedArea()}function inP(p){return currentPalkhi==='all'||p.palkhi===currentPalkhi}function fitMappedArea(){let v=POINTS.filter(p=>inP(p)&&isFinite(p.lat)&&isFinite(p.lng)).map(p=>[p.lat,p.lng]);if(v.length){map.fitBounds(L.latLngBounds(v).pad(.12));setTimeout(()=>map.invalidateSize(true),150)}}function inC(p,c=cat){let t=(p.type||'').toLowerCase();return c==='all'||c==='ambulance'&&t.includes('ambulance')||c==='doctor'&&(t.includes('phc')||t.includes('hbt'))||c==='hospital'&&(t.includes('hospital')||t.includes('rural'))||c==='water'&&t.includes('water')||c==='halt'&&(t.includes('halt')||t.includes('mukkam'))}function dist(p){return userLocation?hav(userLocation[0],userLocation[1],p.lat,p.lng):null}function dir(p){return`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`}function okSearch(p){let q=search.value.trim().toLowerCase();return!q||[p.label,p.type,p.place,p.vehicle,p.doctor,p.pilot,p.base,p.phase,p.date].join(' ').toLowerCase().includes(q)}function visible(c=cat){let pts=POINTS.filter(p=>inP(p)&&inC(p,c)&&okSearch(p)).map(p=>({...p,_idx:POINTS.indexOf(p),dist:dist(p)}));if(userLocation&&rad<99999999)pts=pts.filter(p=>p.dist!=null&&p.dist<=rad);return pts.sort((a,b)=>userLocation?(a.dist??9e9)-(b.dist??9e9):(a.palkhi+a.type+a.label).localeCompare(b.palkhi+b.type+b.label))}function counts(){let s=userLocation?' जवळ':' एकूण';countAmb.textContent=visible('ambulance').length+s;countDoc.textContent=visible('doctor').length+s;countHosp.textContent=visible('hospital').length+s;countHalt.textContent=visible('halt').length+s}function popup(p){let c=tel(p.call),m=[];if(p.vehicle)m.push(`<b>वाहन क्रमांक:</b> ${esc(p.vehicle)}`);if(p.doctor)m.push(`<b>डॉक्टर/EMSO:</b> ${esc(p.doctor)}`);if(p.place)m.push(`<b>ठिकाण:</b> ${esc(p.place)}`);return`<b>${icon(p)} ${esc(p.label)}</b><br><small>${esc(names[p.palkhi])}</small><br>${m.join('<br>')}<br>${c?`<a href="tel:${c}">फोन करा</a> `:''}<a target="_blank" href="${dir(p)}">दिशा</a>`}function draw(pts){markers.forEach(m=>map.removeLayer(m));markers=[];pts.forEach(p=>{let m=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',html:`<div class="pin ${cls(p)}">${icon(p)}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map).bindPopup(popup(p));markers.push(m)})}function line(l,v){return v?`<div><b>${l}</b> ${esc(v)}</div>`:''}function render(pts){if(!pts.length){list.innerHTML='<div class="card">या फिल्टरमध्ये कोणतेही मदत केंद्र सापडले नाही.</div>';return}list.innerHTML=pts.slice(0,80).map(p=>{let c=tel(p.call),verify=p.ready==='verify';return`<article class="card ${cls(p)}"><div class="ct"><div class="ico">${icon(p)}</div><div class="ttl">${esc(p.label)}<div class="badges"><span class="badge">${p.palkhi==='tukaram'?'तुकाराम':'ज्ञानेश्वर'}</span><span class="badge ${verify?'warn':'ok'}">${verify?'पडताळणी आवश्यक':'सार्वजनिक तयार'}</span>${p.mems?`<span class="badge">${esc(p.mems)}</span>`:''}</div></div><div class="dist">${fd(p.dist)}</div></div><div class="meta">${line('ठिकाण:',p.place)}${line('वाहन क्रमांक:',p.vehicle)}${line('डॉक्टर/EMSO:',p.doctor)}${line('बेस:',p.base)}${line('पायलट/EA:',p.pilot)}${line('तारीख:',p.date)}${line('टप्पा:',p.phase)}</div><div class="act">${c?`<a class="call" href="tel:${c}">📞 फोन करा</a>`:`<button>📞 नंबर नाही</button>`}<a class="dir" target="_blank" href="${dir(p)}">🧭 दिशा</a><button class="share" onclick="openShare(${p._idx})">📤 शेअर</button></div></article>`}).join('')}function refresh(){let pts=visible();count.textContent=pts.length;gps.textContent=userLocation?'अंतरानुसार क्रम':'GPS सुरू नाही';draw(pts.slice(0,140));render(pts);counts();setTimeout(()=>map.invalidateSize(true),100)}function locateMe(){if(!navigator.geolocation){gps.textContent='स्थान सुविधा उपलब्ध नाही';return}gps.textContent='GPS स्थान घेत आहोत…';navigator.geolocation.getCurrentPosition(pos=>{userLocation=[pos.coords.latitude,pos.coords.longitude];if(userMarker)map.removeLayer(userMarker);userMarker=L.marker(userLocation,{icon:L.divIcon({className:'',html:'<div class="userpin"></div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map).bindPopup('आपण येथे आहात').openPopup();map.setView(userLocation,16);gps.textContent=`अचूकता ${Math.round(pos.coords.accuracy)} मी.`;refresh();mapPanel.scrollIntoView({behavior:'smooth'})},()=>gps.textContent='GPS मिळाले नाही. Location permission द्या.',{enableHighAccuracy:true,timeout:15000,maximumAge:20000})}function openShare(i){selectedPoint=POINTS[i]?.label||'';modal.classList.add('open')}function closeModal(e){if(!e||e.target.id==='modal'||e.target.textContent==='रद्द करा')modal.classList.remove('open')}function shareCurrentLocation(){let d=dindi.value.trim(),issue=document.getElementById('issue').value,loc=userLocation?`https://www.google.com/maps/search/?api=1&query=${userLocation[0]},${userLocation[1]}`:'स्थान उपलब्ध नाही',msg=`वारी मदत विनंती%0A${encodeURIComponent(issue)}%0A${d?encodeURIComponent('दिंडी/नाव: '+d)+'%0A':''}${selectedPoint?encodeURIComponent('जवळचे मदत केंद्र: '+selectedPoint)+'%0A':''}${encodeURIComponent('माझे स्थान: ')}${encodeURIComponent(loc)}`;if(navigator.share)navigator.share({title:'वारी मदत विनंती',text:decodeURIComponent(msg.replaceAll('%0A','\n'))}).catch(()=>{});else open('https://wa.me/?text='+msg,'_blank');closeModal()}function init(){map=L.map('map',{zoomControl:false}).setView([18.41936,74.02765],10);L.control.zoom({position:'bottomleft'}).addTo(map);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);refresh();setTimeout(fitMappedArea,300);addEventListener('resize',()=>setTimeout(()=>map.invalidateSize(true),150))}init();</script></body></html>
