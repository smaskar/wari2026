# ─────────────────────────────────────────────────────────────────────────────
# Wari analytics DASHBOARD — private URL with login (nginx Basic Auth)
#   URL   : https://wari.maharashtra.gov.in/nhm-dashboard/
#   Login : nhmadmin
#   Pass  : nhm2@@6
# The dashboard HTML is generated by wari-dashboard.py and served ONLY here,
# behind a password. It is NOT part of the public app.
# ─────────────────────────────────────────────────────────────────────────────

# 1) Create the password file ONCE (the hash below is for nhmadmin / nhm2@@6):
#    printf 'nhmadmin:$apr1$jcCL3exy$nshKpt6efYluo3Zyt1sSI1\n' | sudo tee /etc/nginx/wari-dashboard.htpasswd
#    sudo chmod 640 /etc/nginx/wari-dashboard.htpasswd
#    (To change the password later:  sudo htpasswd /etc/nginx/wari-dashboard.htpasswd nhmadmin )

# 2) Generate the dashboard into a NON-public folder:
#    sudo mkdir -p /var/www/wari-dashboard
#    sudo python3 /root/wari-dashboard.py /var/log/nginx/wari-hits.log -o /var/www/wari-dashboard/index.html
#    # include rotated history:
#    sudo python3 /root/wari-dashboard.py '/var/log/nginx/wari-hits.log*' -o /var/www/wari-dashboard/index.html

# 3) Add this location INSIDE the server { } block for wari.maharashtra.gov.in:

location /nhm-dashboard/ {
    auth_basic           "Wari Analytics — NHM";
    auth_basic_user_file /etc/nginx/wari-dashboard.htpasswd;
    alias                /var/www/wari-dashboard/;
    index                index.html;
    add_header           Cache-Control "no-store";
}

# 4) Test + reload:
#    sudo nginx -t && sudo systemctl reload nginx
#    Then open  https://wari.maharashtra.gov.in/nhm-dashboard/  and log in.

# 5) Auto-refresh the dashboard every 15 min (cron):
#    sudo crontab -e   then add:
#    */15 * * * * /usr/bin/python3 /root/wari-dashboard.py /var/log/nginx/wari-hits.log -o /var/www/wari-dashboard/index.html
