<!doctype html>
<html lang="mr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>वारी सहाय्य · नवीन रूप (पूर्वावलोकन)</title>
<style>
:root{--org:#f27405;--red:#d92b2b;--grn:#0d8a4f;--blu:#1558c9;--ink:#231d17;--mut:#7a6f63;--bg:#faf6ef;--card:#fff;--line:#eadfce}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--ink);font-size:19px;padding-bottom:96px}
.top{background:linear-gradient(160deg,#8a3f00,#c96a08);color:#fff;padding:14px 16px 12px}
.top h1{font-size:24px;display:flex;align-items:center;gap:8px}
.top .pv{font-size:12px;background:rgba(255,255,255,.25);border-radius:8px;padding:2px 8px;vertical-align:middle}
.paltabs{display:flex;gap:6px;margin-top:10px}
.paltabs button{flex:1;border:0;border-radius:12px;padding:10px 4px;font-size:15px;background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.paltabs button.on{background:#fff;color:#8a3f00}
.wrap{padding:14px}
.ask{font-size:20px;font-weight:700;margin:4px 2px 10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.task{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px 8px;text-align:center;font-weight:700;font-size:19px;color:var(--ink);box-shadow:0 1px 3px rgba(60,40,0,.06)}
.task .ic{font-size:42px;display:block;margin-bottom:6px}
.task small{display:block;font-weight:500;color:var(--mut);font-size:13px;margin-top:2px}
.task:active{transform:scale(.97)}
.maplink{display:block;text-align:center;margin:16px auto 4px;color:var(--blu);font-size:16px;text-decoration:none}
.bot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1.5px solid var(--line);display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.bot a{flex:1;border-radius:14px;text-align:center;padding:14px 4px;font-size:20px;font-weight:800;text-decoration:none;color:#fff}
.b108{background:var(--red)} .b112{background:#333;flex:.6}
.res{display:none}
.rhead{display:flex;align-items:center;gap:10px;background:#fff;border-bottom:1.5px solid var(--line);padding:12px 14px;position:sticky;top:0;z-index:5}
.back{border:1.5px solid var(--line);background:#fff;border-radius:12px;font-size:18px;padding:8px 14px;font-weight:700}
.rtitle{font-size:21px;font-weight:800}
.gps{font-size:13px;color:var(--mut)}
.list{padding:12px 14px}
.card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(60,40,0,.05)}
.card.ghost{opacity:.62;border-style:dashed}
.nm{font-size:20px;font-weight:800;line-height:1.3}
.badges{margin:4px 0 2px}
.bd{display:inline-block;font-size:12.5px;font-weight:700;border-radius:8px;padding:2px 8px;margin:2px 4px 0 0;background:#f1e8d8;color:#6b5327}
.bd.icu{background:#fde3e3;color:#a31212}.bd.apx{background:#e8e8e8;color:#666}
.pl{color:var(--mut);font-size:15px;margin-top:2px}
.walk{font-size:18px;font-weight:800;color:var(--grn);margin-top:6px}
.acts{display:flex;gap:10px;margin-top:10px}
.acts a{flex:1;text-align:center;border-radius:12px;padding:13px 4px;font-size:18px;font-weight:800;text-decoration:none;color:#fff}
.call{background:var(--grn)} .dir{background:var(--blu)} .acts a.dis{background:#d8d2c6;color:#8d857a;pointer-events:none}
.more{display:block;width:100%;border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:14px;font-size:18px;font-weight:700;margin:4px 0 20px}
.note{background:#fff7e6;border:1.5px solid #f2d9a4;border-radius:12px;padding:10px 12px;font-size:15px;color:#7a5b12;margin-bottom:12px}
</style>
</head>
<body>
<div id="home">
  <div class="top">
    <h1>🙏 वारी सहाय्य <span class="pv">नवीन रूप — पूर्वावलोकन</span></h1>
    <div class="paltabs" id="paltabs">
      <button data-p="all" class="on">दोन्ही</button>
      <button data-p="dnyaneshwar">ज्ञानेश्वर माऊली</button>
      <button data-p="tukaram">तुकोबाराय</button>
    </div>
  </div>
  <div class="wrap">
    <div class="ask">कशाची गरज आहे? खाली दाबा 👇</div>
    <div class="grid">
      <button class="task" onclick="openCat('amb')"><span class="ic">🚑</span>रुग्णवाहिका<small>Ambulance</small></button>
      <button class="task" onclick="openCat('doc')"><span class="ic">🩺</span>डॉक्टर / दवाखाना<small>Doctor / hospital</small></button>
      <button class="task" onclick="openCat('water')"><span class="ic">💧</span>पाणी<small>Water</small></button>
      <button class="task" onclick="openCat('toilet')"><span class="ic">🚻</span>शौचालय<small>Toilet</small></button>
      <button class="task" onclick="openCat('hirkani')"><span class="ic">🤱</span>आई-बाळ कक्ष<small>Hirkani</small></button>
      <button class="task" onclick="openCat('halt')"><span class="ic">⛺</span>मुक्काम / विसावा<small>Mukkam</small></button>
    </div>
    <a class="maplink" href="./map.html">🗺 मोठा नकाशा पहा (अधिकारी/मदतनीस)</a>
  </div>
</div>

<div id="res" class="res">
  <div class="rhead">
    <button class="back" onclick="goHome()">◀ मागे</button>
    <div style="flex:1">
      <div class="rtitle" id="rtitle"></div>
      <div class="gps" id="gps">GPS पाहत आहोत…</div>
    </div>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="bot">
  <a class="b108" href="tel:108">🚑 १०८ — रुग्णवाहिका बोलवा</a>
  <a class="b112" href="tel:112">🛡 ११२</a>
</div>

<script src="./wari-points-1.js"></script>
<script src="./wari-points-2.js"></script>
<script src="./wari-points-3.js"></script>
<script src="./wari-points-4.js"></script>
<script src="./wari-points-5.js"></script>
<script src="./wari-points-tukaram.js"></script>
<script src="./wari-points-dnyaneshwar-halts.js"></script>
<script src="./wari-route-dnyaneshwar-pune.js"></script>
<script src="./wari-points-tukaram-halts.js"></script>
<script src="./wari-points-satara.js"></script>
<script src="./wari-points-hirkani.js"></script>
<script src="./wari-points-private.js"></script>
<script src="./wari-points-solapur.js"></script>
<script src="./wari-points-water-solapur.js"></script>
<script src="./wari-points-toilets.js"></script>
<script src="./wari-points-water-filling.js"></script>
<script src="./wari-data.js"></script>
<script>
const W=window.WariData,P=W.build();
let pal='all',cat=null,user=null,shown=8;
const DV=['०','१','२','३','४','५','६','७','८','९'];
const dv=n=>String(n).replace(/\d/g,d=>DV[+d]);
const CATS={
 amb:{t:'🚑 रुग्णवाहिका',f:p=>W.hasAmb(p)},
 doc:{t:'🩺 डॉक्टर / दवाखाना',f:p=>(W.hasHealth(p)||W.hasDoctor(p))&&p.type!=='Ambulance'},
 water:{t:'💧 पाणी',f:p=>W.hasWater(p)},
 toilet:{t:'🚻 शौचालय',f:p=>W.isToilet(p)},
 hirkani:{t:'🤱 आई-बाळ कक्ष (हिरकणी)',f:p=>W.hasHirkani(p)},
 halt:{t:'⛺ मुक्काम / विसावा',f:p=>W.isHalt(p)}
};
function isApprox(p){return /अंदाजे/.test((p.type||'')+(p.label||''))}
function isICU(p){return /icu|trauma/i.test([p.type,p.label,p.place,p.base].join(' '))}
function badge(p){
 let b=[];
 if(isICU(p))b.push('<span class="bd icu">ICU/ट्रॉमा</span>');
 if(W.isPHC(p))b.push('<span class="bd">प्रा.आ.केंद्र</span>');
 else if(W.isRuralHospital(p))b.push('<span class="bd">ग्रामीण/उपजिल्हा रुग्णालय</span>');
 else if(W.isHBT(p))b.push('<span class="bd">हिंदुहृदयसम्राट बाळासाहेब ठाकरे आपला दवाखाना</span>');
 else if(W.isPrivateHospital(p))b.push('<span class="bd">खाजगी रुग्णालय</span>');
 else if(p.type==='Ambulance')b.push('<span class="bd">रुग्णवाहिका'+(p.vehicle?' · '+W.esc(p.vehicle):'')+'</span>');
 else if(W.isToilet(p))b.push('<span class="bd">शौचालये'+(p.toilet?' · '+W.esc(String(p.toilet)):'')+'</span>');
 else if(W.hasHirkani(p))b.push('<span class="bd">हिरकणी कक्ष</span>');
 else if(W.isHalt(p))b.push('<span class="bd">मुक्काम</span>');
 else if(W.hasWater(p))b.push('<span class="bd">पाणी</span>');
 if(isApprox(p))b.push('<span class="bd apx">अंदाजे ठिकाण</span>');
 return b.join('');
}
function distM(a,b,c,d){const R=6371000,r=x=>x*Math.PI/180;const q=Math.sin(r(c-a)/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(r(d-b)/2)**2;return 2*R*Math.asin(Math.sqrt(q))}
function walkTxt(m){
 if(m==null)return'';
 const min=Math.ceil(m/75);
 if(min<=60)return '🚶 '+dv(min)+' मिनिटे चालत';
 return '🚶 '+dv((m/1000).toFixed(1))+' कि.मी. दूर';
}
function keepPal(p){return pal==='all'||p.palkhi===pal||p.palkhi==='both'}
function openCat(c){cat=c;shown=8;document.getElementById('home').style.display='none';document.getElementById('res').style.display='block';document.getElementById('rtitle').textContent=CATS[c].t;window.scrollTo(0,0);
 if(user)render();else{document.getElementById('gps').textContent='GPS पाहत आहोत…';render();
  navigator.geolocation&&navigator.geolocation.getCurrentPosition(pos=>{user=[pos.coords.latitude,pos.coords.longitude];render()},()=>{document.getElementById('gps').textContent='GPS बंद आहे — गावाच्या नावावरून शोधा';render(true)},{enableHighAccuracy:true,timeout:12000,maximumAge:60000});}
}
function goHome(){document.getElementById('res').style.display='none';document.getElementById('home').style.display='block'}
function render(noGps){
 let pts=P.filter(p=>keepPal(p)&&CATS[cat].f(p));
 if(user){pts.forEach(p=>p._d=distM(user[0],user[1],p.lat,p.lng));pts.sort((a,b)=>a._d-b._d);document.getElementById('gps').textContent='📍 तुमच्या जवळून क्रमाने — एकूण '+dv(pts.length)}
 else{pts.forEach(p=>p._d=null);document.getElementById('gps').textContent=(noGps?'GPS बंद — ':'')+'एकूण '+dv(pts.length)+' ठिकाणे'}
 const L=document.getElementById('list');let h='';
 if(!user&&!noGps)h+='<div class="note">📍 जवळचे प्रथम दिसण्यासाठी GPS सुरू करा (परवानगी द्या)</div>';
 pts.slice(0,shown).forEach(p=>{
  const tel=W.tel(p.call);
  const dirs='https://www.google.com/maps/dir/?api=1&destination='+p.lat+','+p.lng;
  h+='<div class="card'+(isApprox(p)||p.ready==='verify'?' ghost':'')+'">'
   +'<div class="nm">'+W.icon(p)+' '+W.esc(p.label)+'</div>'
   +'<div class="badges">'+badge(p)+'</div>'
   +(p.place&&!(p.label||'').includes(p.place)?'<div class="pl">'+W.esc(p.place)+'</div>':'')
   +(p._d!=null?'<div class="walk">'+walkTxt(p._d)+'</div>':'')
   +'<div class="acts">'
   +(tel?'<a class="call" href="tel:'+tel+'">📞 फोन करा</a>':'<a class="dis">फोन नाही</a>')
   +'<a class="dir" target="_blank" href="'+dirs+'">🧭 रस्ता दाखवा</a>'
   +'</div></div>';
 });
 if(pts.length>shown)h+='<button class="more" onclick="shown+=8;render()">आणखी दाखवा ▾ ('+dv(pts.length-shown)+' उरली)</button>';
 if(!pts.length)h+='<div class="note">या प्रकारची ठिकाणे या पालखी मार्गावर नोंदलेली नाहीत.</div>';
 L.innerHTML=h;
}
document.querySelectorAll('#paltabs button').forEach(b=>b.addEventListener('click',()=>{pal=b.dataset.p;document.querySelectorAll('#paltabs button').forEach(x=>x.classList.toggle('on',x===b))}));
</script>
</body>
</html>
