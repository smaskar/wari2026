<!doctype html>
<html lang="mr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>वारी नियंत्रण कक्ष · नवीन रूप (पूर्वावलोकन)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--org:#c96a08;--ink:#231d17;--mut:#7a6f63;--line:#e7dcc9;--bg:#faf6ef}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans Devanagari',sans-serif;color:var(--ink);height:100vh;display:flex;overflow:hidden;background:var(--bg)}
#side{width:312px;min-width:312px;background:#fff;border-right:1.5px solid var(--line);display:flex;flex-direction:column}
.shead{background:linear-gradient(160deg,#8a3f00,#c96a08);color:#fff;padding:12px 14px}
.shead h1{font-size:17px}
.shead .pv{font-size:11px;background:rgba(255,255,255,.25);border-radius:6px;padding:1px 6px}
.today{background:#fff7e6;border-bottom:1.5px solid var(--line);padding:10px 14px;font-size:13.5px}
.today b{font-size:14.5px}
.today select{margin-top:6px;width:100%;padding:6px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
.sbody{flex:1;overflow-y:auto;padding:10px 14px 20px}
.srch{width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:8px}
.pal{display:flex;gap:5px;margin-bottom:10px}
.pal button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:7px 2px;font-size:12.5px;font-weight:600;cursor:pointer}
.pal button.on{background:#8a3f00;color:#fff;border-color:#8a3f00}
.grp{margin:10px 0 4px;font-size:12px;font-weight:800;color:var(--mut);letter-spacing:.4px}
label.it{display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:14px;cursor:pointer;border-radius:8px}
label.it:hover{background:#faf4e8}
label.it input{width:17px;height:17px;accent-color:#c96a08}
label.it .ct{margin-left:auto;font-size:12px;color:var(--mut);background:#f4ecdd;border-radius:8px;padding:1px 7px}
label.it.sub{padding-left:26px;font-size:13px}
.sfoot{border-top:1.5px solid var(--line);padding:9px 14px;display:flex;gap:8px;align-items:center}
.sfoot .cnt{font-size:13px;color:var(--mut);flex:1}
.sfoot button{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer}
#map{flex:1}
#tbl{position:absolute;left:312px;right:0;bottom:0;max-height:44%;background:#fff;border-top:2px solid var(--org);overflow:auto;display:none;z-index:1000}
#tbl table{width:100%;border-collapse:collapse;font-size:13px}
#tbl th{position:sticky;top:0;background:#8a3f00;color:#fff;text-align:left;padding:7px 10px;font-size:12.5px}
#tbl td{padding:6px 10px;border-bottom:1px solid #f0e8d8}
#tbl tr:hover td{background:#fdf3e0;cursor:pointer}
.pin{width:30px;height:30px;border-radius:50% 50% 50% 4px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35)}
.pin.ghost{opacity:.55;border-style:dashed}
.hl{border:3px solid #d92b2b}
.pop{font-size:14px;line-height:1.5}
.pop .pt{font-weight:800;font-size:15px}
.pop a{display:inline-block;margin:6px 6px 0 0;background:#0d8a4f;color:#fff;border-radius:8px;padding:6px 12px;text-decoration:none;font-weight:700}
.pop a.d{background:#1558c9}
</style>
</head>
<body>
<div id="side">
  <div class="shead"><h1>🎛 वारी नियंत्रण कक्ष <span class="pv">पूर्वावलोकन</span></h1></div>
  <div class="today" id="today"></div>
  <div class="sbody">
    <input class="srch" id="srch" placeholder="🔍 ठिकाण / वाहन / डॉक्टर / गाव शोधा…" oninput="draw()"/>
    <div class="pal" id="pal">
      <button data-p="all" class="on">दोन्ही</button><button data-p="dnyaneshwar">ज्ञानेश्वर</button><button data-p="tukaram">तुकाराम</button>
    </div>
    <div id="layers"></div>
  </div>
  <div class="sfoot">
    <span class="cnt" id="cnt"></span>
    <button onclick="toggleTbl()">📋 यादी</button>
    <button onclick="exportCsv()">⬇ CSV</button>
  </div>
</div>
<div id="map"></div>
<div id="tbl"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./wari-points-1.js"></script>
<script src="./wari-points-2.js"></script>
<script src="./wari-points-3.js"></script>
<script src="./wari-points-4.js"></script>
<script src="./wari-points-5.js"></script>
<script src="./wari-points-tukaram.js"></script>
<script src="./wari-points-dnyaneshwar-halts.js"></script>
<script src="./wari-route-dnyaneshwar-pune.js"></script>
<script src="./wari-points-tukaram-halts.js"></script>
<script src="./wari-points-satara.js"></script>
<script src="./wari-points-hirkani.js"></script>
<script src="./wari-points-private.js"></script>
<script src="./wari-points-solapur.js"></script>
<script src="./wari-points-water-solapur.js"></script>
<script src="./wari-points-toilets.js"></script>
<script src="./wari-points-water-filling.js"></script>
<script src="./wari-data.js"></script>
<script>
const W=window.WariData,P=W.build();
const SCHED=[{"d":"2026-07-07","dny":"","tuk":"देहू"},{"d":"2026-07-08","dny":"आळंदी","tuk":"आकुर्डी"},{"d":"2026-07-09","dny":"भवानीपेठ पुणे","tuk":"नानापेठ पुणे"},{"d":"2026-07-10","dny":"भवानीपेठ पुणे","tuk":"नानापेठ पुणे"},{"d":"2026-07-11","dny":"सासवड","tuk":"लोणीकाळभोर"},{"d":"2026-07-12","dny":"सासवड","tuk":"यवत"},{"d":"2026-07-13","dny":"जेजुरी","tuk":"वरवंड"},{"d":"2026-07-14","dny":"वाल्हा","tuk":"उंडवडी ग."},{"d":"2026-07-15","dny":"लोणंद","tuk":"बारामती"},{"d":"2026-07-16","dny":"लोणंद","tuk":"सणसर"},{"d":"2026-07-17","dny":"तरटगाव","tuk":"अंथुर्णे"},{"d":"2026-07-18","dny":"फलटण","tuk":"निमगाव केतकी"},{"d":"2026-07-19","dny":"बरड","tuk":"इंदापूर"},{"d":"2026-07-20","dny":"नातेपुते","tuk":"सराटी"},{"d":"2026-07-21","dny":"माळशिरस","tuk":"अकलुज"},{"d":"2026-07-22","dny":"वेळापूर","tuk":"बोरगाव"},{"d":"2026-07-23","dny":"भंडीशेगाव","tuk":"पिराची कुरोली"},{"d":"2026-07-24","dny":"वाखरी","tuk":"वाखरी"},{"d":"2026-07-25","dny":"पंढरपूर","tuk":"पंढरपूर"}];
const isApprox=p=>/अंदाजे/.test((p.type||'')+(p.label||''));
const isICU=p=>/icu|trauma/i.test([p.type,p.label,p.place,p.base].join(' '));
const isRingan=p=>/रिंगण/.test([p.type,p.label,p.place].join(' '));
const pureAmb=p=>p.type==='Ambulance';
const LAYERS=[
 {g:'🚨 आपत्कालीन'},
 {k:'amb',n:'रुग्णवाहिका',f:p=>W.hasAmb(p),on:true,col:'#d92b2b',ic:'🚑'},
 {k:'als',n:'फक्त ALS',f:p=>W.hasAmb(p)&&W.isALS(p),sub:'amb',col:'#d92b2b',ic:'🚑'},
 {k:'a108',n:'फक्त १०८',f:p=>W.hasAmb(p)&&W.is108(p),sub:'amb',col:'#d92b2b',ic:'🚑'},
 {k:'icu',n:'ICU / ट्रॉमा बूथ',f:isICU,on:true,col:'#8f1616',ic:'⛑'},
 {g:'🏥 आरोग्य'},
 {k:'phc',n:'प्रा.आ.केंद्र (PHC)',f:p=>W.isPHC(p),col:'#0d8a4f',ic:'🩺'},
 {k:'rh',n:'ग्रामीण / उपजिल्हा रुग्णालय',f:p=>W.isRuralHospital(p),col:'#0d6ea8',ic:'🏥'},
 {k:'hbt',n:'हिंदुहृदयसम्राट बाळासाहेब ठाकरे आपला दवाखाना',f:p=>W.isHBT(p),col:'#0d8a4f',ic:'🏩'},
 {k:'pvt',n:'खाजगी रुग्णालय',f:p=>W.isPrivateHospital(p),col:'#5b4bd6',ic:'🏨'},
 {g:'🚶 यात्री सुविधा'},
 {k:'wat',n:'पाणी — प्रत्यक्ष GPS',f:p=>W.hasWater(p)&&!isApprox(p),col:'#1558c9',ic:'💧'},
 {k:'watx',n:'पाणी — अंदाजे (दर ५०० मी)',f:p=>W.hasWater(p)&&isApprox(p),col:'#7d9bd6',ic:'💧',ghost:true},
 {k:'toi',n:'शौचालये',f:p=>W.isToilet(p),col:'#6b7a2a',ic:'🚻'},
 {k:'hk',n:'हिरकणी कक्ष',f:p=>W.hasHirkani(p),col:'#c2337e',ic:'🤱'},
 {k:'halt',n:'मुक्काम / विसावा',f:p=>W.isHalt(p),col:'#b8860b',ic:'⛺'},
 {g:'📍 नियोजन'},
 {k:'route',n:'पालखी मार्ग (रेषा)',f:null,on:true,col:'#c96a08'},
 {k:'ring',n:'रिंगण स्थळे',f:isRingan,col:'#d92b2b',ic:'⭕'},
 {k:'live',n:'थेट कॅमेरा',f:p=>!!p.live,col:'#333',ic:'🎥'}
];
let pal='all',state={};LAYERS.forEach(l=>{if(l.k)state[l.k]=!!l.on});
const box=document.getElementById('layers');
let h='';
LAYERS.forEach(l=>{
 if(l.g){h+='<div class="grp">'+l.g+'</div>';return}
 const c=l.f?P.filter(l.f).length:'—';
 h+='<label class="it'+(l.sub?' sub':'')+'"><input type="checkbox" data-k="'+l.k+'" '+(state[l.k]?'checked':'')+'/> '+l.n+'<span class="ct">'+c+'</span></label>';
});
box.innerHTML=h;
box.querySelectorAll('input').forEach(i=>i.addEventListener('change',()=>{state[i.dataset.k]=i.checked;draw()}));
document.querySelectorAll('#pal button').forEach(b=>b.addEventListener('click',()=>{pal=b.dataset.p;document.querySelectorAll('#pal button').forEach(x=>x.classList.toggle('on',x===b));draw()}));
const map=L.map('map',{zoomControl:true}).setView([18.2,74.6],9);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const routeL=L.layerGroup().addTo(map),pinL=L.layerGroup().addTo(map),hlL=L.layerGroup().addTo(map);
function keepPal(p){return pal==='all'||p.palkhi===pal||p.palkhi==='both'}
function txtMatch(p,q){if(!q)return true;return [p.label,p.place,p.vehicle,p.doctor,p.pilot,p.mo,p.base,p.type].join(' ').toLowerCase().includes(q)}
function activeLayersFor(p){
 const out=[];
 for(const l of LAYERS){
  if(!l.k||!l.f||!state[l.k])continue;
  if(l.sub&&!state[l.sub])continue;
  if(l.f(p))out.push(l);
 }
 return out;
}
let visible=[];
function draw(){
 const q=document.getElementById('srch').value.trim().toLowerCase();
 routeL.clearLayers();pinL.clearLayers();
 if(state.route&&window.WARI_DNYANESHWAR_PUNE_ROUTE&&pal!=='tukaram')
  L.polyline(window.WARI_DNYANESHWAR_PUNE_ROUTE,{color:'#c96a08',weight:4,opacity:.8}).addTo(routeL);
 const subActive=LAYERS.filter(l=>l.sub&&state[l.k]).map(l=>l.k);
 visible=[];
 P.forEach(p=>{
  if(!keepPal(p)||!txtMatch(p,q))return;
  let ls=activeLayersFor(p).filter(l=>!l.sub);
  if(!ls.length)return;
  if(state.amb&&W.hasAmb(p)&&subActive.length){
    const ok=(!state.als||W.isALS(p))&&(!state.a108||W.is108(p));
    if(!ok){ls=ls.filter(l=>l.k!=='amb');if(!ls.length)return}
  }
  const l=ls[0];
  visible.push(p);
  const ghost=l.ghost||p.ready==='verify'&&isApprox(p);
  L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',html:'<div class="pin'+(ghost?' ghost':'')+'" style="background:'+l.col+'">'+(l.ic||'📍')+'</div>',iconSize:[30,30],iconAnchor:[15,15]})})
   .bindPopup(pop(p)).addTo(pinL);
 });
 document.getElementById('cnt').textContent='दिसत आहेत: '+visible.length+' पिन';
 if(document.getElementById('tbl').style.display==='block')renderTbl();
}
function pop(p){
 const tel=W.tel(p.call);
 return '<div class="pop"><div class="pt">'+W.icon(p)+' '+W.esc(p.label)+'</div>'
 +(p.place?W.esc(p.place)+'<br>':'')
 +(p.vehicle?'🚗 '+W.esc(p.vehicle)+'<br>':'')
 +(p.doctor?'🧑‍⚕️ '+W.esc(p.doctor)+'<br>':'')
 +(isApprox(p)?'<em style="color:#888">अंदाजे स्थान — पडताळणी आवश्यक</em><br>':'')
 +(tel?'<a href="tel:'+tel+'">📞 फोन</a>':'')
 +'<a class="d" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination='+p.lat+','+p.lng+'">🧭 दिशा</a></div>';
}
function toggleTbl(){const t=document.getElementById('tbl');t.style.display=t.style.display==='block'?'none':'block';if(t.style.display==='block')renderTbl()}
function renderTbl(){
 let h='<table><tr><th>नाव</th><th>प्रकार</th><th>ठिकाण</th><th>फोन</th><th>वाहन</th></tr>';
 visible.slice(0,600).forEach((p,i)=>{
  h+='<tr onclick="zoomTo('+i+')"><td>'+W.esc(p.label)+'</td><td>'+W.esc(p.type)+'</td><td>'+W.esc(p.place||'')+'</td><td>'+W.esc(p.call||'')+'</td><td>'+W.esc(p.vehicle||'')+'</td></tr>';
 });
 document.getElementById('tbl').innerHTML=h+'</table>';
}
function zoomTo(i){const p=visible[i];map.setView([p.lat,p.lng],15)}
function exportCsv(){
 const rows=[['label','type','place','phone','vehicle','doctor','palkhi','lat','lng','ready']];
 visible.forEach(p=>rows.push([p.label,p.type,p.place,p.call,p.vehicle,p.doctor,p.palkhi,p.lat,p.lng,p.ready]));
 const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\n');
 const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='wari-visible-points.csv';a.click();
}
// आज strip
(function(){
 const t=document.getElementById('today');
 const today=new Date().toISOString().slice(0,10);
 const hit=SCHED.find(s=>s.d===today);
 let sel='<select id="daysel" onchange="dayGo(this.value)"><option value="">— दिवस निवडा (मुक्काम हायलाइट) —</option>';
 SCHED.forEach(s=>{sel+='<option value="'+s.d+'"'+(s.d===today?' selected':'')+'>'+s.d.slice(8,10)+'/'+s.d.slice(5,7)+' — ज्ञा: '+(s.dny||'—')+' · तुका: '+(s.tuk||'—')+'</option>'});
 sel+='</select>';
 if(hit)t.innerHTML='📅 <b>आज ('+today.slice(8,10)+'/'+today.slice(5,7)+'):</b> ज्ञानेश्वर — '+(hit.dny||'—')+' · तुकाराम — '+(hit.tuk||'—')+sel;
 else{
  const first=new Date('2026-07-07'),n=Math.ceil((first-new Date())/(864e5));
  t.innerHTML='📅 <b>वारी सुरू होण्यास '+(n>0?n+' दिवस':'—')+'</b> — पहिला मुक्काम ०७ जुलै (देहू)'+sel;
 }
 if(hit)dayGo(today);
})();
function dayGo(d){
 hlL.clearLayers();
 if(!d)return;
 const s=SCHED.find(x=>x.d===d);if(!s)return;
 const names=[s.dny,s.tuk].filter(Boolean);
 const hits=P.filter(p=>W.isHalt(p)&&names.some(n=>((p.label||'')+(p.place||'')).includes(n)));
 hits.forEach(p=>L.circle([p.lat,p.lng],{radius:2500,color:'#d92b2b',weight:3,fillOpacity:.06}).addTo(hlL));
 if(hits.length)map.fitBounds(L.latLngBounds(hits.map(p=>[p.lat,p.lng])).pad(.5));
}
draw();
</script>
</body>
</html>
